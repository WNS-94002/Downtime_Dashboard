<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Downtime Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeece7;
    --text-primary: #1a1a18; --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12); --border-light: rgba(0,0,0,0.07);
    --radius-md: 8px; --radius-lg: 12px; --radius-xl: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text-primary: #f0ede8; --text-secondary: #888780;
      --border: rgba(255,255,255,0.12); --border-light: rgba(255,255,255,0.06);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem; }
  .db { max-width: 1200px; margin: 0 auto; }

  /* ── Topbar ───────────────────────────────────────────────── */
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:12px; background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-icon { width:38px; height:38px; border-radius:10px; background:#185fa5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar-icon svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .topbar-title { font-size:17px; font-weight:500; color:var(--text-primary); }
  .topbar-sub { font-size:12px; color:var(--text-secondary); margin-top:1px; }

  /* ── Filter Bar ───────────────────────────────────────────── */
  .filter-bar { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:.75rem 1.25rem; margin-bottom:1rem; display:flex; align-items:center; flex-wrap:wrap; gap:10px; }
  .filter-chip { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:0.5px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--text-secondary); }
  .filter-chip svg { flex-shrink:0; }
  .filter-chip select, .filter-chip input[type=date] { border:none; background:transparent; font-size:12px; color:var(--text-primary); outline:none; cursor:pointer; padding:0; font-family:inherit; }
  .filter-chip input[type=date] { width:110px; }

  /* ── Print Buttons ────────────────────────────────────────── */
  .print-bar { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:.75rem 1.25rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .print-bar-label { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
  .print-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:0.5px solid var(--border); background:var(--bg-secondary); color:var(--text-primary); transition:all .15s; white-space:nowrap; }
  .print-btn:hover { background:var(--bg-tertiary); border-color:var(--text-secondary); }
  .print-btn:active { transform:scale(0.97); }
  .print-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
  .print-btn.bw  { border-color:#534ab7; color:#534ab7; }
  .print-btn.cr  { border-color:#a32d2d; color:#a32d2d; }
  .print-btn.sys { border-color:#185fa5; color:#185fa5; }
  .print-btn.bw:hover  { background:#534ab714; }
  .print-btn.cr:hover  { background:#a32d2d14; }
  .print-btn.sys:hover { background:#185fa514; }

  /* ── Tabs ─────────────────────────────────────────────────── */
  .tab-row { display:flex; gap:4px; background:var(--bg-secondary); border-radius:10px; padding:4px; border:0.5px solid var(--border-light); width:fit-content; margin-bottom:1.25rem; }
  .tab-btn { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-secondary); }
  .tab-btn.active { background:var(--bg-primary); color:var(--text-primary); border:0.5px solid var(--border); }

  /* ── KPI ──────────────────────────────────────────────────── */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(115px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .kpi { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.9rem 1rem; position:relative; overflow:hidden; border:0.5px solid var(--border-light); }
  .kpi-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
  .kpi-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .kpi-val { font-size:20px; font-weight:500; color:var(--text-primary); line-height:1; }
  .kpi-unit { font-size:10px; color:var(--text-secondary); margin-top:3px; }
  .kpi-bar-wrap { height:3px; background:var(--border); border-radius:3px; margin-top:8px; }
  .kpi-bar { height:3px; border-radius:3px; }

  /* ── Layout ───────────────────────────────────────────────── */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  @media(max-width:640px){ .grid2 { grid-template-columns:1fr; } }
  .panel { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .panel-full { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; margin-bottom:1rem; }
  .panel-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .panel-title { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; }
  .chart-wrap { position:relative; width:100%; }
  .leg { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); }
  .leg-sq { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

  /* ── Table ────────────────────────────────────────────────── */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { font-size:10px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:0.5px solid var(--border); text-align:left; white-space:nowrap; }
  td { padding:6px 8px; color:var(--text-primary); border-bottom:0.5px solid var(--border-light); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg-secondary); }
  .num-right { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; }
  .bar-bg { background:var(--border); border-radius:4px; height:5px; margin-top:4px; }
  .bar-f { height:5px; border-radius:4px; }

  /* ── Top5 ─────────────────────────────────────────────────── */
  .section-hdr { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.07em; margin:1.5rem 0 .75rem; }
  .top5-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; margin-bottom:1.5rem; }
  .top5-card { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; }
  .top5-card-hdr { display:flex; align-items:center; gap:10px; padding:.75rem 1rem; border-bottom:0.5px solid var(--border); }
  .top5-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .top5-machine { font-size:13px; font-weight:500; color:var(--text-primary); }
  .top5-total { margin-left:auto; font-size:11px; color:var(--text-secondary); }
  .top5-item { display:flex; align-items:flex-start; gap:8px; padding:.65rem 1rem; border-bottom:0.5px solid var(--border-light); }
  .top5-item:last-child { border-bottom:none; }
  .top5-rank { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:500; flex-shrink:0; margin-top:1px; }
  .top5-info { flex:1; min-width:0; }
  .top5-detail { font-size:11px; color:var(--text-primary); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .top5-meta { display:flex; align-items:center; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .top5-date { font-size:10px; color:var(--text-secondary); }
  .top5-type { display:inline-block; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:500; }
  .top5-smu { font-size:12px; font-weight:500; flex-shrink:0; text-align:right; margin-top:1px; }
  .top5-smu-unit { font-size:9px; font-weight:400; }
  .merged-badge { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:500; background:#534ab722; color:#534ab7; }
  .no-data { padding:1.5rem 1rem; text-align:center; font-size:12px; color:var(--text-secondary); }

  /* ── MTBF/MTTR section ────────────────────────────────────── */
  .info-box { font-size:11px; color:var(--text-secondary); background:var(--bg-secondary); border-radius:8px; padding:8px 12px; margin-bottom:1rem; line-height:1.8; }
  .info-box strong { color:var(--text-primary); }
  .ma-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .ma-card { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.75rem 1rem; text-align:center; }
  .ma-card-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .ma-card-val { font-size:22px; font-weight:500; }
  .ma-card-sub { font-size:10px; color:var(--text-secondary); margin-top:2px; }

  /* ── States ───────────────────────────────────────────────── */
  .load-msg { text-align:center; padding:4rem; color:var(--text-secondary); font-size:14px; }
  .err { background:#fcebeb; color:#a32d2d; border-radius:var(--radius-lg); padding:1rem 1.25rem; font-size:13px; margin:1rem 0; border:0.5px solid #f09595; }
  @media(prefers-color-scheme:dark){ .err { background:#2e1515; color:#f09595; border-color:#791f1f; } }

  /* ═══════════════════════════════════════════════════════════
     PRINT STYLES  (รัน @media print เมื่อ window.print())
     ═══════════════════════════════════════════════════════════ */
  @media print {
    @page { size: A4 landscape; margin: 12mm 10mm; }
    body { background:#fff !important; color:#000 !important; padding:0; font-size:10pt; }

    /* hide everything except the report */
    .db > *:not(#print-report) { display:none !important; }
    #print-report { display:block !important; }

    #print-report * { color:#000 !important; background:#fff !important; border-color:#ccc !important; }

    .rpt-section { page-break-inside:avoid; margin-bottom:14pt; }
    .rpt-section-title { font-size:11pt; font-weight:600; border-bottom:1pt solid #185fa5; padding-bottom:4pt; margin-bottom:8pt; color:#185fa5 !important; }
    .rpt-sub-title { font-size:9pt; font-weight:600; margin-bottom:4pt; color:#333 !important; }

    .rpt-kpi-row { display:flex; gap:8pt; margin-bottom:10pt; flex-wrap:wrap; }
    .rpt-kpi { border:0.5pt solid #ccc; border-radius:4pt; padding:6pt 10pt; min-width:90pt; }
    .rpt-kpi-label { font-size:7pt; color:#666 !important; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2pt; }
    .rpt-kpi-val { font-size:16pt; font-weight:600; }
    .rpt-kpi-unit { font-size:7pt; color:#666 !important; }

    .rpt-ma-row { display:flex; gap:8pt; margin-bottom:10pt; flex-wrap:wrap; }
    .rpt-ma-card { border:0.5pt solid #ccc; border-radius:4pt; padding:6pt 10pt; min-width:100pt; text-align:center; }
    .rpt-ma-label { font-size:7pt; color:#666 !important; text-transform:uppercase; margin-bottom:3pt; }
    .rpt-ma-val { font-size:18pt; font-weight:700; }

    table { width:100%; border-collapse:collapse; font-size:8pt; }
    th { background:#f0f0f0 !important; color:#000 !important; padding:4pt 6pt; border:0.5pt solid #bbb; font-size:7pt; text-align:left; }
    td { padding:3pt 6pt; border:0.5pt solid #ddd; vertical-align:middle; }
    tr:nth-child(even) td { background:#fafafa !important; }

    .rpt-chart-wrap { width:100%; height:140pt; margin-bottom:8pt; }
    .rpt-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10pt; margin-bottom:10pt; }
    .rpt-panel { border:0.5pt solid #ccc; border-radius:4pt; padding:8pt; }
    .rpt-panel-title { font-size:8pt; font-weight:600; color:#333 !important; margin-bottom:6pt; text-transform:uppercase; }

    .no-print { display:none !important; }
    .print-only { display:block !important; }
    .print-footer { position:fixed; bottom:0; left:0; right:0; font-size:7pt; color:#999 !important; text-align:center; padding:4pt; border-top:0.5pt solid #eee; }
  }

  /* default: hide print report */
  #print-report { display:none; }
</style>
</head>
<body>
<div class="db" id="app-root">
  <div id="app"><div class="load-msg">กำลังโหลดข้อมูล...</div></div>
  <!-- print report injected here by JS -->
  <div id="print-report"></div>
</div>

<script>
/* ──────────────────────────────────────────────────────────────
   CONFIG
────────────────────────────────────────────────────────────── */
const SHEET_ID = '1ygTva5iEXjhi-LKMIJAF5909xux1wmSVKCWuZbFDrZA';
const GID      = '103270503';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
const HRS = 24;

/* ── FAILURE TYPE RULES ─────────────────────────────────────── */
const FAILURE_TYPES = {
  'System'         : ['OPT','ME','EE'],
  'Spreader'       : ['ME','EE'],
  'Crusher #1'     : ['ME','EE'],
  'Crusher #2'     : ['ME','EE'],
  'Crusher #3'     : ['ME','EE'],
  'Bucket Wheel #1': ['ME','EE'],
  'Bucket Wheel #2': ['ME','EE'],
};

/* ── PRINT GROUPS ───────────────────────────────────────────── */
const PRINT_GROUPS = {
  bw : { label:'Bucket Wheel Excavator', machines:['Bucket Wheel #1','Bucket Wheel #2'], color:'#534ab7', failTypes:['ME','EE'] },
  cr : { label:'Crusher',                machines:['Crusher #1','Crusher #2'],           color:'#a32d2d', failTypes:['ME','EE'] },
  sys: { label:'System',                 machines:['System'],                             color:'#185fa5', failTypes:['OPT','ME','EE'] },
};

/* ── CONSTANTS ──────────────────────────────────────────────── */
const MACHINES   = ['System','Spreader','Crusher #1','Crusher #2','Crusher #3','Bucket Wheel #1','Bucket Wheel #2'];
const MSHORT     = ['Sys','SPD','CR1','CR2','CR3','BW1','BW2'];
const MALIAS     = {
  'system':'System','spreader':'Spreader',
  'crusher #1':'Crusher #1','crusher#1':'Crusher #1',
  'crusher #2':'Crusher #2','crusher#2':'Crusher #2',
  'crusher #3':'Crusher #3','crusher#3':'Crusher #3',
  'bucket wheel #1':'Bucket Wheel #1','bucket wheel#1':'Bucket Wheel #1',
  'bucket wheel #2':'Bucket Wheel #2','bucket wheel#2':'Bucket Wheel #2',
};
const TYPE_ORDER = ['Plan','ME','EE','OPT','Uncontrol'];
const TC = { Plan:'#185fa5', ME:'#a32d2d', EE:'#854f0b', OPT:'#0f6e56', Uncontrol:'#534ab7' };
const MC = ['#185fa5','#a32d2d','#854f0b','#0f6e56','#534ab7','#993c1d','#993556'];
const DP = [[],[8,4],[4,4],[2,4],[8,4,2,4],[6,2],[4,2,2,2]];
const TH_M = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const RANK_BG  = ['#185fa5','#378add','#85b7eb','#b5d4f4','#e6f1fb'];
const RANK_TXT = ['#fff','#fff','#0c447c','#0c447c','#185fa5'];

/* ── STATE ──────────────────────────────────────────────────── */
let allMerged = [], charts = {}, curTab = 'overview';
let dateFrom = null, dateTo = null;

const isDark    = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
const tickColor = '#888780';

/* ══════════════════════════════════════════════════════════════
   PARSE & MERGE
══════════════════════════════════════════════════════════════ */
function normM(l) { return l ? (MALIAS[l.trim().toLowerCase()] || null) : null; }
function parseTStr(s) { if(!s) return null; const m=s.trim().match(/^(\d{1,2}):(\d{2})$/); return m ? +m[1]*60+ +m[2] : null; }

function parseR(row) {
  const machine = normM(row['Location']); if (!machine) return null;
  const smu = parseFloat(row['SMU']); if (isNaN(smu)||smu<=0) return null;
  const raw = row['Date']; let d = null;
  if (raw) { const p=raw.split('/'); if(p.length===3) d=new Date(+p[2],+p[1]-1,+p[0]); }
  const sm=parseTStr(row['Start']), fm=parseTStr(row['Finish']);
  let as=null, af=null;
  if (d&&sm!==null&&fm!==null) { const b=d.getTime()/60000; as=b+sm; af=b+fm+(fm<=sm?1440:0); }
  return { date:d, machine, smu, type:(row['Type']||'').trim()||'Other', detail:(row['Detail']||'').trim(), absStart:as, absFinish:af, mergedCount:1 };
}

function normD(d) { return (d||'').toLowerCase().replace(/\s+/g,' ').trim(); }
function mergeConsec(records) {
  const sorted = [...records].sort((a,b)=>{ if(a.machine!==b.machine) return a.machine.localeCompare(b.machine); return (a.absStart||0)-(b.absStart||0); });
  const merged = [];
  for (const rec of sorted) {
    if (!rec.absStart||!rec.absFinish) { merged.push({...rec}); continue; }
    let found = false;
    for (let i=merged.length-1; i>=0; i--) {
      const m=merged[i]; if(m.machine!==rec.machine) break; if(!m.absFinish) continue;
      if (m.absFinish===rec.absStart && m.type===rec.type && normD(m.detail)===normD(rec.detail)) {
        m.absFinish=rec.absFinish; m.smu=parseFloat((m.smu+rec.smu).toFixed(4)); m.mergedCount++; found=true; break;
      }
    }
    if (!found) merged.push({...rec});
  }
  return merged;
}

/* ══════════════════════════════════════════════════════════════
   DATE / FILTER HELPERS
══════════════════════════════════════════════════════════════ */
function dateKey(d)   { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:'?'; }
function monthKey(d)  { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`:'?'; }
function monthLabel(k){ if(k==='?')return'?'; const[y,m]=k.split('-'); return`${TH_M[+m-1]} ${y}`; }
function fmtDate(d)   { return d?`${d.getDate()} ${TH_M[d.getMonth()]} ${d.getFullYear()}`:''; }
function shortDate(d) { return d?`${d.getDate()}/${d.getMonth()+1}`:''; }
function toISO(d)     { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:''; }

function inRange(r) {
  if(!r.date) return false;
  if(dateFrom && r.date < dateFrom) return false;
  if(dateTo   && r.date > dateTo)   return false;
  return true;
}
function filterD(data,mo,ty) { return data.filter(r=>inRange(r)&&(mo==='all'||monthKey(r.date)===mo)&&(ty==='all'||r.type===ty)); }
function rangeData() { return allMerged.filter(inRange); }
function sumS(arr)   { return arr.reduce((s,r)=>s+r.smu,0); }
function dChart(id)  { if(charts[id]){charts[id].destroy();delete charts[id];} }
function isFailure(m,t){ return (FAILURE_TYPES[m]||['ME','EE']).includes(t); }

/* ── Color helpers ──────────────────────────────────────────── */
function avC(a)   { return a>=95?'#0f6e56':a>=80?'#854f0b':'#a32d2d'; }
function mttrC(v) { return v<=2?'#0f6e56':v<=6?'#854f0b':'#a32d2d'; }
function mtbfC(v) { return v>=18?'#0f6e56':v>=10?'#854f0b':'#a32d2d'; }

/* ══════════════════════════════════════════════════════════════
   MTTR / MTBF CALCULATION (per machine)
══════════════════════════════════════════════════════════════ */
function calcMTTRMTBF(data) {
  const bmd = {}; MACHINES.forEach(m=>bmd[m]={});
  data.forEach(r=>{
    const dk=dateKey(r.date); if(!bmd[r.machine]) return;
    if(!bmd[r.machine][dk]) bmd[r.machine][dk]={allSMU:0,failSMU:0,failEvents:0,date:r.date};
    bmd[r.machine][dk].allSMU+=r.smu;
    if(isFailure(r.machine,r.type)){ bmd[r.machine][dk].failSMU+=r.smu; bmd[r.machine][dk].failEvents+=1; }
  });
  const daily = {};
  MACHINES.forEach(m=>{
    daily[m]=Object.entries(bmd[m]).map(([dk,v])=>{
      const dt=Math.min(v.failSMU,HRS), up=Math.max(HRS-dt,0);
      const mttr=v.failEvents>0?dt/v.failEvents:0;
      const mtbf=v.failEvents>0?up/v.failEvents:HRS;
      const ma=mttr+mtbf>0?(mtbf/(mtbf+mttr))*100:100;
      return{dk,date:v.date,allSMU:v.allSMU,failSMU:dt,events:v.failEvents,uptime:up,mttr,mtbf,ma};
    }).sort((a,b)=>a.dk.localeCompare(b.dk));
  });
  const summary = {};
  MACHINES.forEach(m=>{
    const rows=daily[m].filter(r=>r.events>0);
    if(!rows.length){summary[m]={totalFailDT:0,totalUptime:0,totalEvents:0,totalDays:0,mttr:0,mtbf:HRS,ma:100};return;}
    const tDT=rows.reduce((s,r)=>s+r.failSMU,0), tEv=rows.reduce((s,r)=>s+r.events,0), tD=rows.length;
    const tUp=Math.max(tD*HRS-tDT,0);
    const mttr=tEv>0?tDT/tEv:0, mtbf=tEv>0?tUp/tEv:HRS;
    const ma=mttr+mtbf>0?(mtbf/(mtbf+mttr))*100:100;
    summary[m]={totalFailDT:tDT,totalUptime:tUp,totalEvents:tEv,totalDays:tD,mttr,mtbf,ma};
  });
  return{daily,summary};
}

/* ── Combined MA% for a group ────────────────────────────────── */
function calcGroupMA(data, machines, failTypes) {
  /* filter data to the group's machines & fail types */
  const fd = data.filter(r => machines.includes(r.machine) && failTypes.includes(r.type));
  /* daily events per group-day */
  const byDay = {};
  data.filter(r=>machines.includes(r.machine)).forEach(r=>{
    const dk=dateKey(r.date);
    if(!byDay[dk]) byDay[dk]={failSMU:0,failEvents:0,date:r.date};
    if(failTypes.includes(r.type)){ byDay[dk].failSMU+=r.smu; byDay[dk].failEvents+=1; }
  });
  const rows = Object.values(byDay).filter(v=>v.failEvents>0);
  if(!rows.length) return {mttr:0,mtbf:HRS,ma:100,totalDays:0,totalEvents:0,totalFailDT:0,totalUptime:0};
  const tDT=rows.reduce((s,r)=>s+Math.min(r.failSMU,HRS),0);
  const tEv=rows.reduce((s,r)=>s+r.failEvents,0);
  const tD=rows.length, tUp=Math.max(tD*HRS-tDT,0);
  const mttr=tEv>0?tDT/tEv:0, mtbf=tEv>0?tUp/tEv:HRS;
  const ma=mttr+mtbf>0?(mtbf/(mtbf+mttr))*100:100;
  return{mttr,mtbf,ma,totalDays:tD,totalEvents:tEv,totalFailDT:tDT,totalUptime:tUp};
}

  const rd    = rangeData();
  const fromS = dateFrom ? fmtDate(dateFrom) : 'ทั้งหมด';
  const toS   = dateTo   ? fmtDate(dateTo)   : 'ทั้งหมด';
  const today = fmtDate(new Date());

  /* data for the group machines */
  const gData  = rd.filter(r => grp.machines.includes(r.machine));
  const gma    = calcGroupMA(rd, grp.machines, grp.failTypes);
  const { daily, summary } = calcMTTRMTBF(rd);

  /* downtime summary per machine in group */
  const machRows = grp.machines.map(m => {
    const s = summary[m];
    const totalDT = sumS(gData.filter(r=>r.machine===m));
    const byType  = {};
    TYPE_ORDER.forEach(t=>byType[t]=0);
    gData.filter(r=>r.machine===m).forEach(r=>{ if(byType[r.type]!==undefined) byType[r.type]+=r.smu; });
    return { m, totalDT, byType, s };
  });

  /* daily breakdown per machine */
  const dailyRows = {}; /* machine → sorted days */
  grp.machines.forEach(m => { dailyRows[m] = (daily[m]||[]).filter(r => r.events > 0 || r.allSMU > 0); });

  /* top-5 events per machine */
  const top5 = {};
  grp.machines.forEach(m => {
    top5[m] = gData.filter(r=>r.machine===m).sort((a,b)=>b.smu-a.smu).slice(0,5);
  });

  /* monthly trend */
  const months = [...new Set(rd.map(r=>monthKey(r.date)).filter(k=>k!=='?'))].sort();
  const monthlyDT = {};
  grp.machines.forEach(m => {
    monthlyDT[m] = {};
    months.forEach(k => monthlyDT[m][k] = 0);
  });
  gData.forEach(r => { const k=monthKey(r.date); if(monthlyDT[r.machine]&&k!=='?') monthlyDT[r.machine][k]+=r.smu; });

  /* ── Build HTML ─────────────────────────────────────────────── */
  const typeFilterNote = `Failure Types ที่ใช้คำนวณ MTTR/MTBF: <strong>${grp.failTypes.join(', ')}</strong>`;

  let html = `
    <!-- HEADER -->
    <div class="rpt-section">
      <table style="width:100%;border:none;margin-bottom:10pt">
        <tr>
          <td style="border:none;padding:0;vertical-align:top">
            <div style="font-size:16pt;font-weight:700;color:${grp.color}">${grp.label}</div>
            <div style="font-size:9pt;color:#555;margin-top:2pt">Downtime Analysis Report</div>
          </td>
          <td style="border:none;padding:0;text-align:right;vertical-align:top;font-size:8pt;color:#666">
            ช่วงวันที่: <strong>${fromS}</strong> — <strong>${toS}</strong><br>
            พิมพ์วันที่: ${today}
          </td>
        </tr>
      </table>
      <div style="height:2pt;background:${grp.color};border-radius:1pt;margin-bottom:12pt"></div>
    </div>

    <!-- MA% SUMMARY -->
    <div class="rpt-section">
      <div class="rpt-section-title" style="color:${grp.color} !important;border-color:${grp.color} !important">Machine Availability Summary</div>
      <div class="rpt-kpi-row">
        <div class="rpt-kpi" style="border-color:${grp.color}">
          <div class="rpt-kpi-label">MA% รวม (${grp.label})</div>
          <div class="rpt-kpi-val" style="color:${avC(gma.ma)}">${gma.ma.toFixed(1)}<span style="font-size:10pt;font-weight:400">%</span></div>
        </div>
        <div class="rpt-kpi">
          <div class="rpt-kpi-label">MTTR รวม</div>
          <div class="rpt-kpi-val" style="color:${mttrC(gma.mttr)}">${gma.mttr.toFixed(2)}</div>
          <div class="rpt-kpi-unit">ชม./ครั้ง</div>
        </div>
        <div class="rpt-kpi">
          <div class="rpt-kpi-label">MTBF รวม</div>
          <div class="rpt-kpi-val" style="color:${mtbfC(gma.mtbf)}">${gma.mtbf.toFixed(2)}</div>
          <div class="rpt-kpi-unit">ชม./ครั้ง</div>
        </div>
        <div class="rpt-kpi">
          <div class="rpt-kpi-label">จำนวนครั้ง Failure</div>
          <div class="rpt-kpi-val">${gma.totalEvents}</div>
          <div class="rpt-kpi-unit">ครั้ง</div>
        </div>
        <div class="rpt-kpi">
          <div class="rpt-kpi-label">รวม Failure DT</div>
          <div class="rpt-kpi-val">${gma.totalFailDT.toFixed(1)}</div>
          <div class="rpt-kpi-unit">ชั่วโมง</div>
        </div>
        ${grp.machines.length > 1 ? grp.machines.map(m=>{
          const s=summary[m]; if(!s||s.totalEvents===0) return'';
          return`<div class="rpt-kpi">
            <div class="rpt-kpi-label">MA% — ${m}</div>
            <div class="rpt-kpi-val" style="color:${avC(s.ma)}">${s.ma.toFixed(1)}<span style="font-size:10pt;font-weight:400">%</span></div>
            <div class="rpt-kpi-unit">MTTR: ${s.mttr.toFixed(2)} | MTBF: ${s.mtbf.toFixed(2)}</div>
          </div>`;
        }).join('') : ''}
      </div>
      <div style="font-size:7pt;color:#666;margin-top:4pt">${typeFilterNote} &nbsp;|&nbsp; Base = 24 ชม./วัน &nbsp;|&nbsp; MA% = MTBF ÷ (MTBF + MTTR) × 100</div>
    </div>

    <!-- DOWNTIME SUMMARY TABLE -->
    <div class="rpt-section">
      <div class="rpt-section-title" style="color:${grp.color} !important;border-color:${grp.color} !important">สรุป Downtime แยกตามประเภท (ชั่วโมง)</div>
      <table>
        <thead><tr>
          <th>เครื่องจักร</th>
          ${TYPE_ORDER.map(t=>`<th style="text-align:right">${t}</th>`).join('')}
          <th style="text-align:right">รวม (ชม.)</th>
        </tr></thead>
        <tbody>
          ${machRows.map(({m,totalDT,byType})=>`<tr>
            <td style="font-weight:600">${m}</td>
            ${TYPE_ORDER.map(t=>`<td style="text-align:right">${byType[t]>0?byType[t].toFixed(1):'—'}</td>`).join('')}
            <td style="text-align:right;font-weight:600">${totalDT.toFixed(1)}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <!-- DAILY TABLE per machine -->
    ${grp.machines.map(m => {
      const rows = dailyRows[m];
      if (!rows || rows.length === 0) return `<div class="rpt-section"><div class="rpt-section-title" style="color:${grp.color} !important;border-color:${grp.color} !important">${m} — ตารางรายวัน</div><p style="font-size:9pt;color:#999">ไม่มีข้อมูล Downtime</p></div>`;
      return `<div class="rpt-section">
        <div class="rpt-section-title" style="color:${grp.color} !important;border-color:${grp.color} !important">${m} — MTTR · MTBF · MA% รายวัน</div>
        <table>
          <thead><tr>
            <th>วันที่</th>
            <th style="text-align:right">ครั้ง Failure</th>
            <th style="text-align:right">Failure DT (ชม.)</th>
            <th style="text-align:right">Uptime (ชม.)</th>
            <th style="text-align:right">MTTR (ชม./ครั้ง)</th>
            <th style="text-align:right">MTBF (ชม./ครั้ง)</th>
            <th style="text-align:right">MA%</th>
          </tr></thead>
          <tbody>
            ${rows.map(r=>`<tr>
              <td style="white-space:nowrap">${fmtDate(r.date)}</td>
              <td style="text-align:right">${r.events}</td>
              <td style="text-align:right">${r.failSMU.toFixed(2)}</td>
              <td style="text-align:right">${r.uptime.toFixed(2)}</td>
              <td style="text-align:right;font-weight:600">${r.events>0?r.mttr.toFixed(2):'—'}</td>
              <td style="text-align:right;font-weight:600">${r.events>0?r.mtbf.toFixed(2):'—'}</td>
              <td style="text-align:right;font-weight:600">${r.events>0?r.ma.toFixed(1)+'%':'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    }).join('')}

    <!-- TOP-5 EVENTS -->
    <div class="rpt-section">
      <div class="rpt-section-title" style="color:${grp.color} !important;border-color:${grp.color} !important">5 อันดับ Downtime สูงสุด แยกตามเครื่อง</div>
      ${grp.machines.map(m => {
        const items = top5[m];
        if (!items || !items.length) return `<p style="font-size:9pt;color:#999;margin-bottom:8pt">ไม่มีข้อมูล — ${m}</p>`;
        return `<div style="margin-bottom:10pt">
          <div class="rpt-sub-title">${m}</div>
          <table>
            <thead><tr><th>#</th><th>รายละเอียด</th><th>วันที่</th><th>ประเภท</th><th style="text-align:right">ชั่วโมง</th></tr></thead>
            <tbody>
              ${items.map((r,i)=>`<tr>
                <td style="font-weight:700;color:${grp.color}">${i+1}</td>
                <td>${r.detail||'—'}</td>
                <td style="white-space:nowrap">${fmtDate(r.date)}</td>
                <td>${r.type}${r.mergedCount>1?` (รวม ${r.mergedCount} กะ)`:''}</td>
                <td style="text-align:right;font-weight:600">${r.smu.toFixed(1)}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
      }).join('')}
    </div>

    <!-- FOOTER -->
    <div class="print-footer">Machine Downtime Dashboard &nbsp;|&nbsp; ช่วง: ${fromS} — ${toS} &nbsp;|&nbsp; พิมพ์: ${today}</div>
  `;

  return html;
}

/* ── Print trigger ──────────────────────────────────────────── */
function printReport(groupKey) {
  const el = document.getElementById('print-report');
  el.innerHTML = buildPDFReport(groupKey);
  setTimeout(() => { window.print(); }, 200);
}

/* ══════════════════════════════════════════════════════════════
   DATE / FILTER HELPERS
══════════════════════════════════════════════════════════════ */
function applyDateRange() {
  const f=document.getElementById('date-from').value, t=document.getElementById('date-to').value;
  dateFrom=f?new Date(f):null; dateTo=t?new Date(t):null;
  if(dateFrom) dateFrom.setHours(0,0,0,0);
  if(dateTo)   dateTo.setHours(23,59,59,999);
  if(curTab==='overview') renderOverview(getMo(),getTy());
  else renderMTTR(document.getElementById('sel-mach')?.value||MACHINES[0]);
}
function getMo() { return document.getElementById('sel-mo')?.value||'all'; }
function getTy() { return document.getElementById('sel-ty')?.value||'all'; }
function switchTab(tab) {
  curTab=tab;
  document.getElementById('tab-ov').classList.toggle('active',tab==='overview');
  document.getElementById('tab-mt').classList.toggle('active',tab==='mttr');
  document.getElementById('ov-filters').style.display=tab==='overview'?'flex':'none';
  if(tab==='overview') renderOverview(getMo(),getTy());
  else renderMTTR(MACHINES[0]);
}

/* ══════════════════════════════════════════════════════════════
   BUILD SHELL
══════════════════════════════════════════════════════════════ */
function buildShell() {
  const allDates=allMerged.map(r=>r.date).filter(Boolean).sort((a,b)=>a-b);
  const minD=allDates[0], maxD=allDates[allDates.length-1];
  dateFrom=minD?new Date(minD.getFullYear(),minD.getMonth(),minD.getDate()):null;
  dateTo  =maxD?new Date(maxD.getFullYear(),maxD.getMonth(),maxD.getDate(),23,59,59,999):null;

  const months=[...new Set(allMerged.map(r=>monthKey(r.date)).filter(k=>k!=='?'))].sort();
  const types=[...new Set(allMerged.map(r=>r.type))].filter(Boolean).sort();

  const SVG_PRINT = `<svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>`;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
        <div><div class="topbar-title">Machine Downtime Dashboard</div><div class="topbar-sub">Downtime · MTTR · MTBF · Machine Availability%</div></div>
      </div>
    </div>

    <!-- filter bar -->
    <div class="filter-bar">
      <span style="font-size:11px;color:var(--text-secondary);white-space:nowrap">ช่วงวันที่:</span>
      <div class="filter-chip"><svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><input type="date" id="date-from" value="${toISO(minD)}"></div>
      <span style="font-size:11px;color:var(--text-secondary)">—</span>
      <div class="filter-chip"><svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><input type="date" id="date-to" value="${toISO(maxD)}"></div>
      <div id="ov-filters" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="filter-chip"><svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><select id="sel-mo"><option value="all">ทุกเดือน</option>${months.map(k=>`<option value="${k}">${monthLabel(k)}</option>`).join('')}</select></div>
        <div class="filter-chip"><svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg><select id="sel-ty"><option value="all">ทุกประเภท</option>${types.map(t=>`<option value="${t}">${t}</option>`).join('')}</select></div>
      </div>
    </div>

    <!-- print bar -->
    <div class="print-bar">
      <span class="print-bar-label">พิมพ์ Report PDF:</span>
      <button class="print-btn bw" onclick="printReport('bw')">${SVG_PRINT} Bucket Wheel Excavator</button>
      <button class="print-btn cr" onclick="printReport('cr')">${SVG_PRINT} Crusher (CR#1 + CR#2)</button>
      <button class="print-btn sys" onclick="printReport('sys')">${SVG_PRINT} System</button>
    </div>

    <!-- tabs -->
    <div class="tab-row">
      <button class="tab-btn active" id="tab-ov">ภาพรวม Downtime</button>
      <button class="tab-btn" id="tab-mt">MTTR / MTBF / MA%</button>
    </div>
    <div id="tab-content"></div>
  `;

  document.getElementById('date-from').addEventListener('change', applyDateRange);
  document.getElementById('date-to').addEventListener('change', applyDateRange);
  document.getElementById('sel-mo').addEventListener('change', ()=>{ if(curTab==='overview') renderOverview(getMo(),getTy()); });
  document.getElementById('sel-ty').addEventListener('change', ()=>{ if(curTab==='overview') renderOverview(getMo(),getTy()); });
  document.getElementById('tab-ov').addEventListener('click', ()=>switchTab('overview'));
  document.getElementById('tab-mt').addEventListener('click', ()=>switchTab('mttr'));

  renderOverview('all','all');
}

/* ══════════════════════════════════════════════════════════════
   LOAD DATA
══════════════════════════════════════════════════════════════ */
async function init() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const result = Papa.parse(text, { header:true, skipEmptyLines:true });
    allMerged = mergeConsec(result.data.map(parseR).filter(Boolean));
    buildShell();
  } catch(e) {
    document.getElementById('app').innerHTML=`
      <div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div><div><div class="topbar-title">Machine Downtime Dashboard</div></div></div></div>
      <div class="err"><strong>ไม่สามารถดึงข้อมูลได้:</strong> ${e.message}<br><br>กรุณาตรวจสอบว่า Google Sheet ถูกตั้งค่า <strong>"Anyone with the link can view"</strong></div>`;
  }
}
init();
</script>
</body>
</html>
