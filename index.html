<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Downtime Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --bg-tertiary: #eeece7;
    --text-primary: #1a1a18;
    --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12);
    --border-light: rgba(0,0,0,0.07);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a;
      --bg-secondary: #252523;
      --bg-tertiary: #2e2e2b;
      --text-primary: #f0ede8;
      --text-secondary: #888780;
      --border: rgba(255,255,255,0.12);
      --border-light: rgba(255,255,255,0.06);
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-tertiary);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 1.5rem;
  }
  .db { max-width: 1100px; margin: 0 auto; }

  /* ── Top Bar ─────────────────────────────────────────────── */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px;
    background: var(--bg-primary); border: 0.5px solid var(--border);
    border-radius: var(--radius-xl); padding: 1rem 1.25rem;
  }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .topbar-icon {
    width: 38px; height: 38px; border-radius: 10px; background: #185fa5;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .topbar-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .topbar-title { font-size: 17px; font-weight: 500; color: var(--text-primary); }
  .topbar-sub   { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }

  /* ── Filters ─────────────────────────────────────────────── */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .filter-chip {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg-secondary); border: 0.5px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text-secondary);
  }
  .filter-chip svg { flex-shrink: 0; }
  .filter-chip select {
    border: none; background: transparent; font-size: 12px;
    color: var(--text-primary); outline: none; cursor: pointer; padding: 0; font-family: inherit;
  }

  /* ── KPI Row ─────────────────────────────────────────────── */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr)); gap: 10px; margin-bottom: 1.25rem; }
  .kpi {
    background: var(--bg-secondary); border-radius: var(--radius-lg);
    padding: 0.9rem 1rem; position: relative; overflow: hidden; border: 0.5px solid var(--border-light);
  }
  .kpi-accent   { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: var(--radius-lg) 0 0 var(--radius-lg); }
  .kpi-label    { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 5px; }
  .kpi-val      { font-size: 21px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .kpi-unit     { font-size: 10px; color: var(--text-secondary); margin-top: 3px; }
  .kpi-bar-wrap { height: 3px; background: var(--border); border-radius: 3px; margin-top: 8px; }
  .kpi-bar      { height: 3px; border-radius: 3px; }

  /* ── Two-col Grid ───────────────────────────────────────── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  @media (max-width: 640px) { .grid2 { grid-template-columns: 1fr; } }

  /* ── Panels ─────────────────────────────────────────────── */
  .panel      { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-xl); padding: 1rem 1.25rem; }
  .panel-full { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-xl); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .panel-hdr  { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .panel-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .06em; }
  .chart-wrap  { position: relative; width: 100%; }

  /* ── Legend ─────────────────────────────────────────────── */
  .leg      { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .leg-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--text-secondary); }
  .leg-sq   { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* ── Summary Table ──────────────────────────────────────── */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th {
    font-size: 10px; font-weight: 500; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: .05em;
    padding: 5px 8px; border-bottom: 0.5px solid var(--border); text-align: left; white-space: nowrap;
  }
  td { padding: 7px 8px; color: var(--text-primary); border-bottom: 0.5px solid var(--border-light); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-secondary); transition: background .15s; }
  .pill   { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; }
  .bar-bg { background: var(--border); border-radius: 4px; height: 5px; margin-top: 4px; }
  .bar-f  { height: 5px; border-radius: 4px; }

  /* ── Top-5 Section ──────────────────────────────────────── */
  .section-hdr {
    font-size: 11px; font-weight: 500; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: .07em; margin: 1.5rem 0 .75rem;
  }
  .top5-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem; margin-bottom: 1.5rem;
  }
  .top5-card { background: var(--bg-primary); border: 0.5px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
  .top5-card-hdr { display: flex; align-items: center; gap: 10px; padding: .75rem 1rem; border-bottom: 0.5px solid var(--border); }
  .top5-dot     { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .top5-machine { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .top5-total   { margin-left: auto; font-size: 11px; color: var(--text-secondary); }
  .top5-item {
    display: flex; align-items: flex-start; gap: 8px;
    padding: .65rem 1rem; border-bottom: 0.5px solid var(--border-light);
  }
  .top5-item:last-child { border-bottom: none; }
  .top5-rank {
    width: 18px; height: 18px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 500; flex-shrink: 0; margin-top: 1px;
  }
  .top5-info   { flex: 1; min-width: 0; }
  .top5-detail { font-size: 11px; color: var(--text-primary); line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top5-meta   { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .top5-date   { font-size: 10px; color: var(--text-secondary); }
  .top5-type   { display: inline-block; padding: 1px 6px; border-radius: 10px; font-size: 9px; font-weight: 500; }
  .top5-smu    { font-size: 12px; font-weight: 500; flex-shrink: 0; text-align: right; margin-top: 1px; }
  .top5-smu-unit { font-size: 9px; font-weight: 400; }
  .no-data { padding: 1.5rem 1rem; text-align: center; font-size: 12px; color: var(--text-secondary); }

  /* ── States ─────────────────────────────────────────────── */
  .load-msg { text-align: center; padding: 4rem; color: var(--text-secondary); font-size: 14px; }
  .err {
    background: #fcebeb; color: #a32d2d;
    border-radius: var(--radius-lg); padding: 1rem 1.25rem;
    font-size: 13px; margin: 1rem 0; border: 0.5px solid #f09595;
  }
  @media (prefers-color-scheme: dark) {
    .err { background: #2e1515; color: #f09595; border-color: #791f1f; }
  }
</style>
</head>
<body>
<div class="db" id="app">
  <div class="load-msg">กำลังโหลดข้อมูล...</div>
</div>

<script>
/* ─── CONFIG ──────────────────────────────────────────────────── */
const SHEET_ID = '1ygTva5iEXjhi-LKMIJAF5909xux1wmSVKCWuZbFDrZA';
const GID      = '103270503';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

/* ─── CONSTANTS ───────────────────────────────────────────────── */
const MACHINES = ['System','Spreader','Crusher #1','Crusher #2','Crusher #3','Bucket Wheel #1','Bucket Wheel #2'];
const MSHORT   = ['Sys','SPD','CR1','CR2','CR3','BW1','BW2'];
const MALIAS   = {
  'system':'System','spreader':'Spreader',
  'crusher #1':'Crusher #1','crusher#1':'Crusher #1',
  'crusher #2':'Crusher #2','crusher#2':'Crusher #2',
  'crusher #3':'Crusher #3','crusher#3':'Crusher #3',
  'bucket wheel #1':'Bucket Wheel #1','bucket wheel#1':'Bucket Wheel #1',
  'bucket wheel #2':'Bucket Wheel #2','bucket wheel#2':'Bucket Wheel #2',
};
const TYPE_ORDER    = ['Plan','ME','EE','OPT','Uncontrol'];
const TC            = { Plan:'#185fa5', ME:'#a32d2d', EE:'#854f0b', OPT:'#0f6e56', Uncontrol:'#534ab7' };
const MC            = ['#185fa5','#a32d2d','#854f0b','#0f6e56','#534ab7','#993c1d','#993556'];
const DASH_PATTERNS = [[],[8,4],[4,4],[2,4],[8,4,2,4],[6,2],[4,2,2,2]];
const TH_MONTHS     = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const RANK_BG       = ['#185fa5','#378add','#85b7eb','#b5d4f4','#e6f1fb'];
const RANK_TXT      = ['#fff','#fff','#0c447c','#0c447c','#185fa5'];

/* ─── GLOBALS ─────────────────────────────────────────────────── */
let allData = [], charts = {};
const isDark    = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
const tickColor = '#888780';

/* ─── HELPERS ─────────────────────────────────────────────────── */
function normMachine(loc) { return loc ? (MALIAS[loc.trim().toLowerCase()] || null) : null; }

function parseRecord(row) {
  const machine = normMachine(row['Location']);
  if (!machine) return null;
  const smu = parseFloat(row['SMU']);
  if (isNaN(smu) || smu <= 0) return null;
  const raw = row['Date']; let d = null;
  if (raw) { const p = raw.split('/'); if (p.length === 3) d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])); }
  return { date:d, machine, smu, type:(row['Type']||'').trim()||'Other', detail:(row['Detail']||'').trim() };
}

function monthKey(d)   { return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : '?'; }
function monthLabel(k) { if (k==='?') return '?'; const [y,m]=k.split('-'); return `${TH_MONTHS[parseInt(m)-1]} ${y}`; }
function fmtDate(d)    { return d ? `${d.getDate()} ${TH_MONTHS[d.getMonth()]} ${d.getFullYear()}` : ''; }
function filterData(mo,ty) { return allData.filter(r => (mo==='all'||monthKey(r.date)===mo) && (ty==='all'||r.type===ty)); }
function sumSMU(arr)   { return arr.reduce((s,r) => s+r.smu, 0); }
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

/* ─── TOP-5 CARD ──────────────────────────────────────────────── */
function top5CardHTML(machine, fd, color) {
  const items  = fd.filter(r => r.machine===machine).sort((a,b) => b.smu-a.smu).slice(0,5);
  const total  = sumSMU(fd.filter(r => r.machine===machine));
  const maxSmu = items[0]?.smu || 1;
  if (!items.length) return `
    <div class="top5-card">
      <div class="top5-card-hdr"><span class="top5-dot" style="background:${color}"></span><span class="top5-machine">${machine}</span></div>
      <div class="no-data">ไม่มีข้อมูล</div>
    </div>`;
  return `
    <div class="top5-card">
      <div class="top5-card-hdr">
        <span class="top5-dot" style="background:${color}"></span>
        <span class="top5-machine">${machine}</span>
        <span class="top5-total">${total.toFixed(1)} ชม. รวม</span>
      </div>
      ${items.map((r,i) => `
        <div class="top5-item">
          <div class="top5-rank" style="background:${RANK_BG[i]};color:${RANK_TXT[i]}">${i+1}</div>
          <div class="top5-info">
            <div class="top5-detail" title="${r.detail}">${r.detail||'—'}</div>
            <div class="top5-meta">
              <span class="top5-date">${fmtDate(r.date)}</span>
              <span class="top5-type" style="background:${(TC[r.type]||'#888')}22;color:${TC[r.type]||'#888'}">${r.type}</span>
            </div>
            <div style="height:3px;background:var(--border);border-radius:3px;margin-top:5px">
              <div style="height:3px;border-radius:3px;width:${(r.smu/maxSmu*100).toFixed(1)}%;background:${color}"></div>
            </div>
          </div>
          <div class="top5-smu" style="color:${color}">${r.smu.toFixed(1)}<span class="top5-smu-unit"> ชม.</span></div>
        </div>`).join('')}
    </div>`;
}

/* ─── BUILD DASHBOARD ─────────────────────────────────────────── */
function buildUI(mo, ty) {
  const fd    = filterData(mo, ty);
  const total = sumSMU(fd);
  const bySMU = {}; MACHINES.forEach(m => bySMU[m]=0);
  fd.forEach(r => { if (bySMU[r.machine]!==undefined) bySMU[r.machine]+=r.smu; });
  const byType = {}; TYPE_ORDER.forEach(t => byType[t]=0);
  fd.forEach(r => { if (byType[r.type]!==undefined) byType[r.type]+=r.smu; });
  const months = [...new Set(allData.map(r=>monthKey(r.date)).filter(k=>k!=='?'))].sort();
  const types  = [...new Set(allData.map(r=>r.type))].filter(Boolean).sort();
  const maxVal = Math.max(...Object.values(bySMU), 1);
  const mmd = {};
  MACHINES.forEach(m => { mmd[m]={}; months.forEach(k => mmd[m][k]=0); });
  allData.filter(r=>ty==='all'||r.type===ty).forEach(r => { const k=monthKey(r.date); if(mmd[r.machine]&&k!=='?') mmd[r.machine][k]+=r.smu; });
  const typeLabels = TYPE_ORDER.filter(t=>byType[t]>0);
  const typeVals   = typeLabels.map(t=>byType[t]);
  const typeColors = typeLabels.map(t=>TC[t]||'#888');

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
        <div><div class="topbar-title">Machine Downtime Dashboard</div><div class="topbar-sub">ภาพรวมการหยุดเครื่องจักร · ข้อมูลจาก Google Sheets</div></div>
      </div>
      <div class="filters">
        <div class="filter-chip">
          <svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <select id="sel-mo"><option value="all">ทุกเดือน</option>${months.map(k=>`<option value="${k}" ${mo===k?'selected':''}>${monthLabel(k)}</option>`).join('')}</select>
        </div>
        <div class="filter-chip">
          <svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          <select id="sel-ty"><option value="all">ทุกประเภท</option>${types.map(t=>`<option value="${t}" ${ty===t?'selected':''}>${t}</option>`).join('')}</select>
        </div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-accent" style="background:#185fa5"></div><div class="kpi-label">รวมทั้งหมด</div><div class="kpi-val">${total.toFixed(1)}</div><div class="kpi-unit">ชั่วโมง</div></div>
      ${MACHINES.map((m,i)=>`<div class="kpi"><div class="kpi-accent" style="background:${MC[i]}"></div><div class="kpi-label">${MSHORT[i]}</div><div class="kpi-val">${bySMU[m].toFixed(1)}</div><div class="kpi-unit">ชม.</div><div class="kpi-bar-wrap"><div class="kpi-bar" style="width:${maxVal>0?(bySMU[m]/maxVal*100).toFixed(1):0}%;background:${MC[i]}"></div></div></div>`).join('')}
    </div>

    <div class="grid2">
      <div class="panel">
        <div class="panel-hdr"><span class="panel-title">Downtime ต่อเครื่อง</span></div>
        <div class="chart-wrap" style="height:240px"><canvas id="c-bar" role="img" aria-label="Bar chart Downtime per machine">Downtime per machine</canvas></div>
      </div>
      <div class="panel">
        <div class="panel-hdr"><span class="panel-title">แยกตามประเภท</span></div>
        <div class="leg" id="leg-type"></div>
        <div class="chart-wrap" style="height:200px"><canvas id="c-donut" role="img" aria-label="Donut chart Downtime by type">Downtime by type</canvas></div>
      </div>
    </div>

    <div class="panel-full">
      <div class="panel-hdr"><span class="panel-title">แนวโน้มรายเดือน</span></div>
      <div class="leg" id="leg-trend"></div>
      <div class="chart-wrap" style="height:200px"><canvas id="c-line" role="img" aria-label="Line chart monthly Downtime trend">Trend</canvas></div>
    </div>

    <div class="panel-full">
      <div class="panel-hdr"><span class="panel-title">สรุปแยกเครื่อง × ประเภท (ชั่วโมง)</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>เครื่องจักร</th>
          ${TYPE_ORDER.map(t=>`<th><span class="pill" style="background:${TC[t]}22;color:${TC[t]}">${t}</span></th>`).join('')}
          <th>รวม</th><th style="min-width:90px">%</th>
        </tr></thead>
        <tbody>
          ${MACHINES.map((m,i)=>{
            const bt={}; TYPE_ORDER.forEach(t=>bt[t]=0);
            fd.filter(r=>r.machine===m).forEach(r=>{ if(bt[r.type]!==undefined) bt[r.type]+=r.smu; });
            const tot=Object.values(bt).reduce((a,b)=>a+b,0);
            const pct=total>0?tot/total*100:0;
            return `<tr>
              <td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${MC[i]};margin-right:6px;vertical-align:middle"></span><span style="font-weight:500">${m}</span></td>
              ${TYPE_ORDER.map(t=>`<td style="color:${bt[t]>0?'var(--text-primary)':'var(--text-secondary)'}">${bt[t]>0?bt[t].toFixed(1):'—'}</td>`).join('')}
              <td style="font-weight:500">${tot.toFixed(1)}</td>
              <td><div style="font-size:11px;color:var(--text-secondary)">${pct.toFixed(1)}%</div><div class="bar-bg"><div class="bar-f" style="width:${pct.toFixed(1)}%;background:${MC[i]}"></div></div></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>

    <div class="section-hdr">5 อันดับ Downtime สูงสุด แยกตามเครื่องจักร</div>
    <div class="top5-grid">
      ${MACHINES.map((m,i) => top5CardHTML(m, fd, MC[i])).join('')}
    </div>
  `;

  document.getElementById('sel-mo').addEventListener('change', e => buildUI(e.target.value, document.getElementById('sel-ty').value));
  document.getElementById('sel-ty').addEventListener('change', e => buildUI(document.getElementById('sel-mo').value, e.target.value));

  destroyChart('bar'); destroyChart('donut'); destroyChart('line');

  charts['bar'] = new Chart(document.getElementById('c-bar'), {
    type: 'bar',
    data: { labels: MSHORT, datasets: [{ label:'ชั่วโมง', data: MACHINES.map(m=>parseFloat(bySMU[m].toFixed(2))), backgroundColor: MC.map(c=>c+'cc'), borderColor: MC, borderWidth:1.5, borderRadius:6, borderSkipped:false }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{ label:ctx=>` ${ctx.parsed.y.toFixed(1)} ชม.`, title:ctx=>[MACHINES[ctx[0].dataIndex]] }} }, scales:{ x:{grid:{display:false},ticks:{color:tickColor,font:{size:11}}}, y:{grid:{color:gridColor},border:{display:false},ticks:{color:tickColor,font:{size:11},callback:v=>v.toFixed(0)}} } }
  });

  document.getElementById('leg-type').innerHTML = typeLabels.map((t,i)=>`<span class="leg-item"><span class="leg-sq" style="background:${typeColors[i]}"></span>${t} ${((typeVals[i]/typeVals.reduce((a,b)=>a+b,1))*100).toFixed(0)}%</span>`).join('');
  charts['donut'] = new Chart(document.getElementById('c-donut'), {
    type: 'doughnut',
    data: { labels:typeLabels, datasets:[{ data:typeVals.map(v=>parseFloat(v.toFixed(2))), backgroundColor:typeColors.map(c=>c+'cc'), borderColor:typeColors, borderWidth:1.5, hoverOffset:6 }] },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:ctx=>` ${ctx.parsed.toFixed(1)} ชม.`}} }, cutout:'62%' }
  });

  document.getElementById('leg-trend').innerHTML = MACHINES.map((m,i)=>`<span class="leg-item"><span class="leg-sq" style="background:${MC[i]}"></span>${MSHORT[i]}</span>`).join('');
  charts['line'] = new Chart(document.getElementById('c-line'), {
    type: 'line',
    data: { labels:months.map(monthLabel), datasets:MACHINES.map((m,i)=>({ label:m, data:months.map(k=>parseFloat((mmd[m][k]||0).toFixed(2))), borderColor:MC[i], backgroundColor:MC[i]+'18', borderWidth:2, borderDash:DASH_PATTERNS[i], pointRadius:3, pointBackgroundColor:MC[i], tension:0.35, fill:false })) },
    options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)} ชม.`}} }, scales:{ x:{grid:{color:gridColor},border:{display:false},ticks:{color:tickColor,font:{size:11},maxRotation:45,autoSkip:months.length>6}}, y:{grid:{color:gridColor},border:{display:false},ticks:{color:tickColor,font:{size:11},callback:v=>v.toFixed(0)}} } }
  });
}

/* ─── LOAD DATA ───────────────────────────────────────────────── */
async function init() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const result = Papa.parse(text, { header:true, skipEmptyLines:true });
    allData = result.data.map(parseRecord).filter(Boolean);
    if (!allData.length) throw new Error('ไม่พบข้อมูลในชีต');
    buildUI('all', 'all');
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>
          <div><div class="topbar-title">Machine Downtime Dashboard</div><div class="topbar-sub">ภาพรวมการหยุดเครื่องจักร</div></div>
        </div>
      </div>
      <div class="err"><strong>ไม่สามารถดึงข้อมูลได้:</strong> ${e.message}<br><br>กรุณาตรวจสอบว่า Google Sheet ถูกตั้งค่า <strong>"Anyone with the link can view"</strong><br><small style="opacity:.7;margin-top:6px;display:block">URL: ${CSV_URL}</small></div>
    `;
  }
}

init();
</script>
