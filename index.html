
<h2 class="sr-only">Dashboard ภาพรวม Downtime เครื่องจักร แยกตาม Machine และ Type</h2>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.dash { padding: 1rem 0; }
.title-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
.dash-title { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.subtitle { font-size: 13px; color: var(--color-text-secondary); }
.filter-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center; }
.filter-label { font-size: 13px; color: var(--color-text-secondary); }
select { font-size: 13px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; }
.card-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-value { font-size: 22px; font-weight: 500; color: var(--color-text-primary); line-height: 1.2; }
.card-sub { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }
.chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
@media (max-width: 640px) { .chart-row { grid-template-columns: 1fr; } }
.chart-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.chart-card-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
.chart-wrap { position: relative; width: 100%; }
.legend { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--color-text-secondary); }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.table-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; overflow-x: auto; }
.table-card-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { text-align: left; padding: 6px 8px; color: var(--color-text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--color-border-tertiary); white-space: nowrap; }
td { padding: 6px 8px; color: var(--color-text-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
tr:last-child td { border-bottom: none; }
.bar-bg { background: var(--color-background-secondary); border-radius: 4px; height: 6px; margin-top: 3px; }
.bar-fill { height: 6px; border-radius: 4px; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 500; }
.loading { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px; }
.error-msg { color: var(--color-text-danger); font-size: 13px; padding: 1rem; background: var(--color-background-danger); border-radius: var(--border-radius-md); }
</style>

<div class="dash" id="app">
  <div class="loading">กำลังโหลดข้อมูล...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
const SHEET_ID = '1ygTva5iEXjhi-LKMIJAF5909xux1wmSVKCWuZbFDrZA';
const GID = '103270503';
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

const TARGET_MACHINES = ['System', 'Spreader', 'Crusher #1', 'Crusher #2', 'Crusher #3', 'Bucket Wheel #1', 'Bucket Wheel #2'];
const MACHINE_ALIASES = {
  'system': 'System',
  'spreader': 'Spreader',
  'crusher #1': 'Crusher #1', 'crusher#1': 'Crusher #1',
  'crusher #2': 'Crusher #2', 'crusher#2': 'Crusher #2',
  'crusher #3': 'Crusher #3', 'crusher#3': 'Crusher #3',
  'bucket wheel #1': 'Bucket Wheel #1', 'bucket wheel#1': 'Bucket Wheel #1',
  'bucket wheel #2': 'Bucket Wheel #2', 'bucket wheel#2': 'Bucket Wheel #2',
};

const TYPE_COLORS = {
  'Plan':      '#3266ad',
  'ME':        '#e24b4a',
  'EE':        '#ef9f27',
  'OPT':       '#1d9e75',
  'Uncontrol': '#7f77dd',
};
const TYPE_ORDER = ['Plan','ME','EE','OPT','Uncontrol'];

const MACHINE_COLORS = ['#3266ad','#e24b4a','#ef9f27','#1d9e75','#7f77dd','#d85a30','#d4537e'];

let allData = [];
let charts = {};

function normalizeMachine(loc) {
  if (!loc) return null;
  const lower = loc.trim().toLowerCase();
  return MACHINE_ALIASES[lower] || null;
}

function parseRecord(row) {
  const machine = normalizeMachine(row['Location']);
  if (!machine) return null;
  const smu = parseFloat(row['SMU']);
  if (isNaN(smu) || smu <= 0) return null;
  const rawDate = row['Date'];
  let dateObj = null;
  if (rawDate) {
    const parts = rawDate.split('/');
    if (parts.length === 3) {
      const d = parseInt(parts[0]), m = parseInt(parts[1]), y = parseInt(parts[2]);
      dateObj = new Date(y, m - 1, d);
    }
  }
  return {
    date: dateObj,
    machine,
    smu,
    type: row['Type'] ? row['Type'].trim() : 'Other',
    detail: row['Detail'] || '',
  };
}

function getMonthKey(d) {
  if (!d) return 'Unknown';
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function getMonthLabel(key) {
  if (key === 'Unknown') return 'Unknown';
  const [y, m] = key.split('-');
  const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  return `${months[parseInt(m)-1]} ${y}`;
}

function filterData(data, month, type) {
  return data.filter(r => {
    const mk = getMonthKey(r.date);
    if (month !== 'all' && mk !== month) return false;
    if (type !== 'all' && r.type !== type) return false;
    return true;
  });
}

function sumBySMU(arr) {
  return arr.reduce((s, r) => s + r.smu, 0);
}

function destroyChart(id) {
  if (charts[id]) { charts[id].destroy(); delete charts[id]; }
}

function buildDashboard(month, type) {
  const filtered = filterData(allData, month, type);
  const app = document.getElementById('app');

  const totalSMU = sumBySMU(filtered);

  const bySMU = {};
  TARGET_MACHINES.forEach(m => bySMU[m] = 0);
  filtered.forEach(r => { if (bySMU[r.machine] !== undefined) bySMU[r.machine] += r.smu; });

  const byType = {};
  TYPE_ORDER.forEach(t => byType[t] = 0);
  filtered.forEach(r => {
    if (byType[r.type] !== undefined) byType[r.type] += r.smu;
    else if (!byType[r.type]) byType[r.type] = r.smu;
  });

  const months = [...new Set(allData.map(r => getMonthKey(r.date)).filter(k => k !== 'Unknown'))].sort();
  const types = [...new Set(allData.map(r => r.type))].filter(Boolean).sort();

  const maxSMU = Math.max(...Object.values(bySMU), 1);

  const machineMonthData = {};
  TARGET_MACHINES.forEach(m => {
    machineMonthData[m] = {};
    months.forEach(mk => machineMonthData[m][mk] = 0);
  });
  allData.filter(r => type === 'all' || r.type === type).forEach(r => {
    const mk = getMonthKey(r.date);
    if (machineMonthData[r.machine] && mk) machineMonthData[r.machine][mk] += r.smu;
  });

  const topMonthData = {};
  months.forEach(mk => {
    topMonthData[mk] = 0;
    TARGET_MACHINES.forEach(m => topMonthData[mk] += (machineMonthData[m][mk] || 0));
  });

  app.innerHTML = `
    <div class="title-row">
      <div>
        <div class="dash-title">Downtime Dashboard</div>
        <div class="subtitle">ภาพรวม Downtime เครื่องจักร — ข้อมูลจาก Google Sheets</div>
      </div>
    </div>
    <div class="filter-row">
      <span class="filter-label">เดือน:</span>
      <select id="sel-month">
        <option value="all">ทั้งหมด</option>
        ${months.map(mk => `<option value="${mk}" ${month===mk?'selected':''}>${getMonthLabel(mk)}</option>`).join('')}
      </select>
      <span class="filter-label">ประเภท:</span>
      <select id="sel-type">
        <option value="all">ทั้งหมด</option>
        ${types.map(t => `<option value="${t}" ${type===t?'selected':''}>${t}</option>`).join('')}
      </select>
    </div>

    <div class="cards-grid">
      <div class="card">
        <div class="card-label">รวม Downtime</div>
        <div class="card-value">${totalSMU.toFixed(1)}</div>
        <div class="card-sub">ชั่วโมง</div>
      </div>
      ${TARGET_MACHINES.map(m => `
        <div class="card">
          <div class="card-label">${m}</div>
          <div class="card-value">${bySMU[m].toFixed(1)}</div>
          <div class="card-sub">ชั่วโมง</div>
        </div>
      `).join('')}
    </div>

    <div class="chart-row">
      <div class="chart-card">
        <div class="chart-card-title">Downtime แยกตามเครื่องจักร (ชั่วโมง)</div>
        <div class="chart-wrap" style="height:280px"><canvas id="c-machine" role="img" aria-label="Bar chart Downtime per machine">Downtime per machine</canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Downtime แยกตามประเภท</div>
        <div class="legend" id="type-legend"></div>
        <div class="chart-wrap" style="height:240px"><canvas id="c-type" role="img" aria-label="Doughnut chart Downtime by type">Downtime by type</canvas></div>
      </div>
    </div>

    <div class="chart-card" style="margin-bottom:1.5rem">
      <div class="chart-card-title">แนวโน้ม Downtime รายเดือน (ชั่วโมง)</div>
      <div class="legend" id="trend-legend"></div>
      <div class="chart-wrap" style="height:${Math.max(220, months.length * 20)}px">
        <canvas id="c-trend" role="img" aria-label="Line chart Downtime trend by month">Downtime trend</canvas>
      </div>
    </div>

    <div class="table-card">
      <div class="table-card-title">สรุป Downtime แยกเครื่องจักร × ประเภท (ชั่วโมง)</div>
      <table>
        <thead>
          <tr>
            <th>เครื่องจักร</th>
            ${TYPE_ORDER.map(t => `<th>${t}</th>`).join('')}
            <th>รวม</th>
            <th style="min-width:100px">สัดส่วน</th>
          </tr>
        </thead>
        <tbody>
          ${TARGET_MACHINES.map(m => {
            const byT = {};
            TYPE_ORDER.forEach(t => byT[t] = 0);
            filtered.filter(r => r.machine === m).forEach(r => { if (byT[r.type] !== undefined) byT[r.type] += r.smu; });
            const tot = Object.values(byT).reduce((a,b) => a+b, 0);
            const pct = totalSMU > 0 ? tot / totalSMU * 100 : 0;
            return `<tr>
              <td style="font-weight:500">${m}</td>
              ${TYPE_ORDER.map(t => `<td>${byT[t] > 0 ? byT[t].toFixed(1) : '—'}</td>`).join('')}
              <td style="font-weight:500">${tot.toFixed(1)}</td>
              <td>
                <div style="font-size:11px;color:var(--color-text-secondary)">${pct.toFixed(1)}%</div>
                <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${MACHINE_COLORS[TARGET_MACHINES.indexOf(m)%MACHINE_COLORS.length]}"></div></div>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('sel-month').addEventListener('change', e => buildDashboard(e.target.value, document.getElementById('sel-type').value));
  document.getElementById('sel-type').addEventListener('change', e => buildDashboard(document.getElementById('sel-month').value, e.target.value));

  destroyChart('machine'); destroyChart('type'); destroyChart('trend');

  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#b4b2a9' : '#5f5e5a';

  const machineLabels = TARGET_MACHINES;
  const machineValues = machineLabels.map(m => bySMU[m]);
  charts['machine'] = new Chart(document.getElementById('c-machine'), {
    type: 'bar',
    data: {
      labels: machineLabels.map(l => l.length > 14 ? l.replace(' #', '\n#') : l),
      datasets: [{
        label: 'ชั่วโมง',
        data: machineValues,
        backgroundColor: MACHINE_COLORS,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.y.toFixed(1)} ชม.` } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: textColor, font: { size: 11 } } },
        y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 }, callback: v => v.toFixed(0) } }
      }
    }
  });

  const typeLabels = TYPE_ORDER.filter(t => byType[t] > 0);
  const typeValues = typeLabels.map(t => byType[t]);
  const typeColors = typeLabels.map(t => TYPE_COLORS[t] || '#888');

  const typeLeg = document.getElementById('type-legend');
  typeLeg.innerHTML = typeLabels.map((t,i) => `<span class="leg-item"><span class="leg-dot" style="background:${typeColors[i]}"></span>${t} ${((typeValues[i]/(typeValues.reduce((a,b)=>a+b,1)))*100).toFixed(1)}%</span>`).join('');

  charts['type'] = new Chart(document.getElementById('c-type'), {
    type: 'doughnut',
    data: {
      labels: typeLabels,
      datasets: [{ data: typeValues, backgroundColor: typeColors, hoverOffset: 4, borderWidth: 1 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.parsed.toFixed(1)} ชม.` } } },
      cutout: '60%'
    }
  });

  const trendLeg = document.getElementById('trend-legend');
  trendLeg.innerHTML = TARGET_MACHINES.map((m,i) => `<span class="leg-item"><span class="leg-dot" style="background:${MACHINE_COLORS[i]}"></span>${m}</span>`).join('');

  charts['trend'] = new Chart(document.getElementById('c-trend'), {
    type: 'line',
    data: {
      labels: months.map(getMonthLabel),
      datasets: TARGET_MACHINES.map((m, i) => ({
        label: m,
        data: months.map(mk => machineMonthData[m][mk] || 0),
        borderColor: MACHINE_COLORS[i],
        backgroundColor: MACHINE_COLORS[i] + '22',
        borderWidth: 2,
        pointRadius: 3,
        tension: 0.3,
        fill: false,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)} ชม.` } } },
      scales: {
        x: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 }, maxRotation: 45, autoSkip: false } },
        y: { grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11 }, callback: v => v.toFixed(0) } }
      }
    }
  });
}

async function loadData() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const result = Papa.parse(text, { header: true, skipEmptyLines: true });
    allData = result.data.map(parseRecord).filter(Boolean);
    if (allData.length === 0) throw new Error('ไม่พบข้อมูล');
    buildDashboard('all', 'all');
  } catch (err) {
    document.getElementById('app').innerHTML = `
      <div class="title-row">
        <div class="dash-title">Downtime Dashboard</div>
      </div>
      <div class="error-msg">ไม่สามารถดึงข้อมูลจาก Google Sheets ได้: ${err.message}<br><br>กรุณาตรวจสอบว่า Sheet มีการแชร์เป็น "Anyone with the link can view" แล้วรีเฟรช</div>
      <div style="margin-top:1rem;font-size:13px;color:var(--color-text-secondary)">ตัวอย่างข้อมูลที่ควรมีในชีต: Date | Location | Start | Finish | Time | SMU | Detail | Type</div>
    `;
  }
}

loadData();
</script>
