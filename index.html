<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Downtime Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* ── Reset & Base ─────────────────────────────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeece7;
    --text-primary: #1a1a18; --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12); --border-light: rgba(0,0,0,0.07);
    --radius-md: 8px; --radius-lg: 12px; --radius-xl: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text-primary: #f0ede8; --text-secondary: #888780;
      --border: rgba(255,255,255,0.12); --border-light: rgba(255,255,255,0.06);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem; }
  .db { max-width: 1200px; margin: 0 auto; }

  /* ── Topbar ───────────────────────────────────────────────── */
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; flex-wrap:wrap; gap:12px; background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-icon { width:38px; height:38px; border-radius:10px; background:#185fa5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar-icon svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .topbar-title { font-size:17px; font-weight:500; color:var(--text-primary); }
  .topbar-sub { font-size:12px; color:var(--text-secondary); margin-top:1px; }

  /* ── Filter Bar ───────────────────────────────────────────── */
  .filter-bar { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:.75rem 1.25rem; margin-bottom:1rem; display:flex; align-items:center; flex-wrap:wrap; gap:10px; }
  .filter-chip { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:0.5px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--text-secondary); }
  .filter-chip svg { flex-shrink:0; }
  .filter-chip select, .filter-chip input[type=date] { border:none; background:transparent; font-size:12px; color:var(--text-primary); outline:none; cursor:pointer; padding:0; font-family:inherit; }
  .filter-chip input[type=date] { width:110px; }

  /* ── Print Buttons ────────────────────────────────────────── */
  .print-bar { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:.75rem 1.25rem; margin-bottom:1.25rem; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .print-bar-label { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; white-space:nowrap; }
  .print-btn { display:inline-flex; align-items:center; gap:6px; padding:7px 14px; border-radius:20px; font-size:12px; font-weight:500; cursor:pointer; border:0.5px solid var(--border); background:var(--bg-secondary); color:var(--text-primary); transition:all .15s; white-space:nowrap; }
  .print-btn:hover { background:var(--bg-tertiary); border-color:var(--text-secondary); }
  .print-btn:active { transform:scale(0.97); }
  .print-btn svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; flex-shrink:0; }
  .print-btn.bw  { border-color:#534ab7; color:#534ab7; }
  .print-btn.cr  { border-color:#a32d2d; color:#a32d2d; }
  .print-btn.sys { border-color:#185fa5; color:#185fa5; }
  .print-btn.bw:hover  { background:#534ab714; }
  .print-btn.cr:hover  { background:#a32d2d14; }
  .print-btn.sys:hover { background:#185fa514; }

  /* ── Tabs ─────────────────────────────────────────────────── */
  .tab-row { display:flex; gap:4px; background:var(--bg-secondary); border-radius:10px; padding:4px; border:0.5px solid var(--border-light); width:fit-content; margin-bottom:1.25rem; }
  .tab-btn { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-secondary); }
  .tab-btn.active { background:var(--bg-primary); color:var(--text-primary); border:0.5px solid var(--border); }

  /* ── KPI ──────────────────────────────────────────────────── */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(115px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .kpi { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.9rem 1rem; position:relative; overflow:hidden; border:0.5px solid var(--border-light); }
  .kpi-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
  .kpi-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .kpi-val { font-size:20px; font-weight:500; color:var(--text-primary); line-height:1; }
  .kpi-unit { font-size:10px; color:var(--text-secondary); margin-top:3px; }
  .kpi-bar-wrap { height:3px; background:var(--border); border-radius:3px; margin-top:8px; }
  .kpi-bar { height:3px; border-radius:3px; }

  /* ── Layout ───────────────────────────────────────────────── */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  @media(max-width:640px){ .grid2 { grid-template-columns:1fr; } }
  .panel { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .panel-full { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; margin-bottom:1rem; }
  .panel-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .panel-title { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; }
  .chart-wrap { position:relative; width:100%; }
  .leg { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); }
  .leg-sq { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

  /* ── Table ────────────────────────────────────────────────── */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { font-size:10px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:0.5px solid var(--border); text-align:left; white-space:nowrap; }
  td { padding:6px 8px; color:var(--text-primary); border-bottom:0.5px solid var(--border-light); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg-secondary); }
  .num-right { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; }
  .bar-bg { background:var(--border); border-radius:4px; height:5px; margin-top:4px; }
  .bar-f { height:5px; border-radius:4px; }

  /* ── Section & Detail Table ─────────────────────────────── */
  .section-hdr { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.07em; margin:1.5rem 0 .75rem; }
  .merged-badge { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:500; background:#534ab722; color:#534ab7; }
  .no-data { padding:1.5rem 1rem; text-align:center; font-size:12px; color:var(--text-secondary); }

  /* ── Detail Table Controls ───────────────────────────────── */
  .dt-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
  .dt-machine-btns { display:flex; flex-wrap:wrap; gap:6px; }
  .dt-mach-btn {
    padding:5px 12px; border-radius:20px; font-size:11px; font-weight:500;
    cursor:pointer; border:0.5px solid var(--border); background:var(--bg-secondary);
    color:var(--text-secondary); transition:all .15s; white-space:nowrap;
  }
  .dt-mach-btn:hover { border-color:var(--text-secondary); color:var(--text-primary); }
  .dt-mach-btn.active { color:#fff; border-color:transparent; }
  .dt-type-btns { display:flex; gap:4px; flex-wrap:wrap; margin-left:auto; }
  .dt-type-btn {
    padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500;
    cursor:pointer; border:0.5px solid var(--border); background:var(--bg-secondary);
    color:var(--text-secondary); transition:all .15s;
  }
  .dt-type-btn:hover { opacity:.85; }
  .dt-type-btn.active { color:#fff; border-color:transparent; }
  .dt-count { font-size:11px; color:var(--text-secondary); white-space:nowrap; padding-left:4px; }
  .dt-sort-th:hover { color:var(--text-primary) !important; background:var(--bg-secondary); }
  .dt-search-wrap { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:0.5px solid var(--border); border-radius:20px; padding:5px 12px; }
  .dt-search-wrap svg { flex-shrink:0; color:var(--text-secondary); }
  .dt-search-input { border:none; background:transparent; font-size:12px; color:var(--text-primary); outline:none; font-family:inherit; width:200px; }
  .dt-search-input::placeholder { color:var(--text-secondary); }
  .dt-detail-col { max-width:320px; white-space:normal; line-height:1.4; font-size:11.5px; }

  /* ── MTBF/MTTR section ────────────────────────────────────── */
  .info-box { font-size:11px; color:var(--text-secondary); background:var(--bg-secondary); border-radius:8px; padding:8px 12px; margin-bottom:1rem; line-height:1.8; }
  .info-box strong { color:var(--text-primary); }
  .ma-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .ma-card { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.75rem 1rem; text-align:center; }
  .ma-card-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; margin-bottom:6px; }
  .ma-card-val { font-size:22px; font-weight:500; }
  .ma-card-sub { font-size:10px; color:var(--text-secondary); margin-top:2px; }

  /* ── States ───────────────────────────────────────────────── */
  /* ── Loading Overlay ─────────────────────────────────────── */
  .load-overlay {
    position:fixed; inset:0; z-index:9999;
    background:var(--bg-tertiary);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:20px;
  }
  .load-overlay.hidden { display:none; }
  .load-logo {
    width:48px; height:48px; border-radius:14px;
    background:#185fa5;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 24px rgba(24,95,165,.35);
  }
  .load-logo svg { width:24px; height:24px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .load-title { font-size:16px; font-weight:500; color:var(--text-primary); }
  .load-sub   { font-size:12px; color:var(--text-secondary); margin-top:-12px; }
  .load-bar-wrap {
    width:240px; height:5px;
    background:var(--border);
    border-radius:5px; overflow:hidden;
  }
  .load-bar {
    height:5px; border-radius:5px;
    background: linear-gradient(90deg, #185fa5, #4a90d9);
    width:0%;
    transition:width .4s ease;
  }
  .load-step { font-size:11px; color:var(--text-secondary); min-height:16px; text-align:center; }
  .load-msg { text-align:center; padding:4rem; color:var(--text-secondary); font-size:14px; }
  .err { background:#fcebeb; color:#a32d2d; border-radius:var(--radius-lg); padding:1rem 1.25rem; font-size:13px; margin:1rem 0; border:0.5px solid #f09595; }
  @media(prefers-color-scheme:dark){ .err { background:#2e1515; color:#f09595; border-color:#791f1f; } }

  /* ═══════════════════════════════════════════════════════════
     PRINT STYLES  — 1 machine = 1 page, A4 Portrait
     ═══════════════════════════════════════════════════════════ */
  @media print {
    @page { size: A4 portrait; margin: 10mm 12mm 10mm 12mm; }
    body { background:#fff !important; color:#000 !important; padding:0; font-size:9pt; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

    /* ── HIDE EVERYTHING by default, then selectively show only the report ── */
    body > *       { display:none !important; }
    #app-root      { display:block !important; }
    #app-root > *  { display:none !important; }
    #print-report  { display:block !important; }
    #print-report * { display:revert; }
    .load-overlay, .topbar, .filter-bar, .print-bar, .tab-row, #tab-content { display:none !important; }

    /* ── Machine page wrapper: force one per page ── */
    .rpt-machine-page {
      page-break-after: always;
      page-break-inside: avoid;
      display: flex;
      flex-direction: column;
      max-height: 257mm; /* A4 portrait - margins */
      height: 257mm;
      box-sizing: border-box;
      overflow: hidden;
    }
    .rpt-machine-page:last-child { page-break-after: auto; }

    /* ── Report header (top of each machine page) ── */
    .rpt-page-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 3pt;
      padding-bottom: 3pt;
      border-bottom: 1.5pt solid var(--rpt-color, #185fa5);
      flex-shrink: 0;
    }
    .rpt-page-header-title { font-size:12pt; font-weight:700; }
    .rpt-page-header-sub   { font-size:7pt;  color:#555 !important; margin-top:1pt; }
    .rpt-page-header-meta  { font-size:6.5pt; color:#555 !important; text-align:right; line-height:1.4; }

    /* ── Section title ── */
    .rpt-sec-title {
      font-size:7pt; font-weight:700; text-transform:uppercase;
      letter-spacing:.04em; margin:3pt 0 2pt;
      padding-bottom:1.5pt; border-bottom:0.5pt solid #ccc;
      color:#333 !important;
      flex-shrink: 0;
    }
    .rpt-sec-title.accent { border-bottom-color: var(--rpt-color, #185fa5) !important; }

    /* ── KPI bar (summary numbers) ── */
    .rpt-kpi-bar {
      display:flex; gap:4pt; margin-bottom:4pt; flex-wrap:nowrap;
      flex-shrink: 0;
    }
    .rpt-kpi-box {
      flex:1; border:0.5pt solid #ddd; border-radius:2pt;
      padding:3pt 4pt; min-width:0;
      border-left: 1.5pt solid var(--rpt-color, #ccc) !important;
    }
    .rpt-kpi-box-label { font-size:6pt; color:#666 !important; text-transform:uppercase; letter-spacing:.03em; margin-bottom:0.5pt; }
    .rpt-kpi-box-val   { font-size:11pt; font-weight:700; line-height:1; }
    .rpt-kpi-box-unit  { font-size:6pt; color:#777 !important; margin-top:0.5pt; }
    .rpt-kpi-ma        { background:#f0f7ff !important; border-left-width:2pt !important; }

    /* ── Sub-machine MA row (for groups with 2 machines) ── */
    .rpt-submachine-row { display:flex; gap:6pt; margin-bottom:6pt; }
    .rpt-submachine-card {
      flex:1; border:0.5pt solid #ddd; border-radius:3pt; padding:4pt 6pt;
      display:flex; align-items:center; gap:8pt;
    }
    .rpt-submachine-name { font-size:8pt; font-weight:600; }
    .rpt-submachine-ma   { font-size:14pt; font-weight:700; margin-left:auto; }
    .rpt-submachine-detail { font-size:7pt; color:#666 !important; }

    /* ── Tables ── */
    .rpt-table-wrap { overflow:hidden; margin-bottom:3pt; flex-shrink: 0; }
    .rpt-table { width:100%; border-collapse:collapse; font-size:6.5pt; }
    .rpt-table th {
      background:#f4f4f4 !important; color:#222 !important;
      padding:2pt 3pt; border:0.5pt solid #ccc;
      font-size:6pt; font-weight:700; text-align:left; white-space:nowrap;
    }
    .rpt-table td { padding:1.5pt 3pt; border:0.5pt solid #e0e0e0; vertical-align:middle; line-height:1.2; }
    .rpt-table tr:nth-child(even) td { background:#fafafa !important; }
    .rpt-table .tr { text-align:right; }
    .rpt-table .num { text-align:right; font-variant-numeric:tabular-nums; }
    .rpt-table .bold { font-weight:700; }
    .rpt-table .g  { color:#0f6e56 !important; font-weight:700; }
    .rpt-table .y  { color:#854f0b !important; font-weight:700; }
    .rpt-table .r  { color:#a32d2d !important; font-weight:700; }

    /* ── Top-5 compact table ── */
    .rpt-top5-sub { font-size:7.5pt; font-weight:700; margin:4pt 0 2pt; color:#333 !important; }

    /* ── Signature block — compact, at bottom of each page ── */
    .rpt-sig-spacer { flex:1; min-height:2pt; }
    .rpt-sig-block {
      margin-top:3pt;
      border-top:0.5pt solid #bbb;
      padding-top:2pt;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10pt;
      flex-shrink: 0;
    }
    .rpt-sig-box { text-align:center; }
    .rpt-sig-role { font-size:6.5pt; font-weight:700; color:#222 !important; margin-bottom:8pt; }
    .rpt-sig-line { border-bottom:0.5pt solid #555; margin-bottom:2pt; }
    .rpt-sig-detail { font-size:6pt; color:#555 !important; line-height:1.3; }

    .no-print { display:none !important; }
  }

  /* default: hide print report */
  #print-report { display:none; }
</style>
</head>
<body>
<!-- Loading Overlay -->
<div class="load-overlay" id="load-overlay">
  <div class="load-logo">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </div>
  <div class="load-title">Machine Downtime Dashboard</div>
  <div class="load-sub" id="load-step">กำลังเชื่อมต่อ Google Sheets...</div>
  <div class="load-bar-wrap">
    <div class="load-bar" id="load-bar"></div>
  </div>
</div>

<div class="db" id="app-root">
  <div id="app"><div class="load-msg">กำลังโหลดข้อมูล...</div></div>
  <!-- print report injected here by JS -->
  <div id="print-report"></div>
</div>

<script>

  'bucket wheel #1':'Bucket Wheel #1','bucket wheel#1':'Bucket Wheel #1',
  'bucket wheel #2':'Bucket Wheel #2','bucket wheel#2':'Bucket Wheel #2',
};
const TYPE_ORDER = ['Plan','ME','EE','OPT','Uncontrol'];
const TC = { Plan:'#185fa5', ME:'#a32d2d', EE:'#854f0b', OPT:'#0f6e56', Uncontrol:'#534ab7' };

/* ══════════════════════════════════════════════════════════════
   PARSE & MERGE
══════════════════════════════════════════════════════════════ */
function normM(l) { return l ? (MALIAS[l.trim().toLowerCase()] || null) : null; }
function parseTStr(s) { if(!s) return null; const m=s.trim().match(/^(\d{1,2}):(\d{2})$/); return m ? +m[1]*60+ +m[2] : null; }

function parseR(row) {
  const machine = normM(row['Location']); if (!machine) return null;
  const smu = parseFloat(row['SMU']); if (isNaN(smu)||smu<=0) return null;
  const raw = row['Date']; let d = null;
  if (raw) { const p=raw.split('/'); if(p.length===3) d=new Date(+p[2],+p[1]-1,+p[0]); }
  const sm=parseTStr(row['Start']), fm=parseTStr(row['Finish']);
  let as=null, af=null;
  if (d&&sm!==null&&fm!==null) { const b=d.getTime()/60000; as=b+sm; af=b+fm+(fm<=sm?1440:0); }
  return { date:d, machine, smu, type:(row['Type']||'').trim()||'Other', detail:(row['Detail']||'').trim(), absStart:as, absFinish:af, mergedCount:1 };
}

function normD(d) { return (d||'').toLowerCase().replace(/\s+/g,' ').trim(); }
function mergeConsec(records) {
  const sorted = [...records].sort((a,b)=>{ if(a.machine!==b.machine) return a.machine.localeCompare(b.machine); return (a.absStart||0)-(b.absStart||0); });
  const merged = [];
  for (const rec of sorted) {
    if (!rec.absStart||!rec.absFinish) { merged.push({...rec}); continue; }
    let found = false;
    for (let i=merged.length-1; i>=0; i--) {
      const m=merged[i]; if(m.machine!==rec.machine) break; if(!m.absFinish) continue;
      if (m.absFinish===rec.absStart && m.type===rec.type && normD(m.detail)===normD(rec.detail)) {
        m.absFinish=rec.absFinish; m.smu=parseFloat((m.smu+rec.smu).toFixed(4)); m.mergedCount++; found=true; break;
      }
    }
    if (!found) merged.push({...rec});
  }
  return merged;
}

/* ══════════════════════════════════════════════════════════════
   DATE / FILTER HELPERS
══════════════════════════════════════════════════════════════ */
function dateKey(d)   { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:'?'; }
function monthKey(d)  { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`:'?'; }
function monthLabel(k){ if(k==='?')return'?'; const[y,m]=k.split('-'); return`${TH_M[+m-1]} ${y}`; }
function fmtDate(d)   { return d?`${d.getDate()} ${TH_M[d.getMonth()]} ${d.getFullYear()}`:''; }
function shortDate(d) { return d?`${d.getDate()}/${d.getMonth()+1}`:''; }
function toISO(d)     { return d?`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`:''; }

function inRange(r) {
  if(!r.date) return false;
  if(dateFrom && r.date < dateFrom) return false;
  if(dateTo   && r.date > dateTo)   return false;
  return true;
}
function filterD(data,mo,ty) { return data.filter(r=>inRange(r)&&(mo==='all'||monthKey(r.date)===mo)&&(ty==='all'||r.type===ty)); }
function rangeData() { return allMerged.filter(inRange); }
function sumS(arr)   { return arr.reduce((s,r)=>s+r.smu,0); }
function dChart(id)  { if(charts[id]){charts[id].destroy();delete charts[id];} }
function isFailure(m,t){ return (FAILURE_TYPES[m]||['ME','EE']).includes(t); }

/* ── Color helpers ──────────────────────────────────────────── */
function avC(a)   { return a>=95?'#0f6e56':a>=80?'#854f0b':'#a32d2d'; }
function mttrC(v) { return v<=2?'#0f6e56':v<=6?'#854f0b':'#a32d2d'; }
function mtbfC(v) { return v>=18?'#0f6e56':v>=10?'#854f0b':'#a32d2d'; }

/* ══════════════════════════════════════════════════════════════
   MTTR / MTBF CALCULATION (per machine)
══════════════════════════════════════════════════════════════ */
function calcMTTRMTBF(data) {
  /* ── Step 1: bucket every data row by machine+date ── */
  const bmd = {}; MACHINES.forEach(m=>bmd[m]={});
  data.forEach(r=>{
    const dk=dateKey(r.date); if(!bmd[r.machine]) return;
    if(!bmd[r.machine][dk]) bmd[r.machine][dk]={allSMU:0,failSMU:0,failEvents:0,date:r.date};
    bmd[r.machine][dk].allSMU+=r.smu;
    if(isFailure(r.machine,r.type)){ bmd[r.machine][dk].failSMU+=r.smu; bmd[r.machine][dk].failEvents+=1; }
  });

  /* ── Step 2: build a full list of days in [dateFrom, dateTo] ── */
  function allDaysInRange() {
    const days = [];
    if (!dateFrom || !dateTo) return days;
    const cur = new Date(dateFrom);
    cur.setHours(0,0,0,0);
    const end = new Date(dateTo);
    end.setHours(23,59,59,999);
    while (cur <= end) {
      days.push(dateKey(cur));
      cur.setDate(cur.getDate() + 1);
    }
    return days;
  }
  const rangeDays = allDaysInRange();

  /* ── Step 3: build daily rows — one per day per machine ── */
  const daily = {};
  MACHINES.forEach(m=>{
    /* rows from actual data */
    const dataRows = Object.entries(bmd[m]).map(([dk,v])=>{
      const dt=Math.min(v.failSMU,HRS), up=Math.max(HRS-dt,0);
      const mttr=v.failEvents>0?dt/v.failEvents:0;
      const mtbf=v.failEvents>0?up/v.failEvents:HRS;
      const ma=mttr+mtbf>0?(mtbf/(mtbf+mttr))*100:100;
      return{dk,date:v.date,allSMU:v.allSMU,failSMU:dt,events:v.failEvents,uptime:up,mttr,mtbf,ma,hasData:true};
    });
    const dataMap = {};
    dataRows.forEach(r=>dataMap[r.dk]=r);

    /* merge with full date range — fill missing days with zeroes */
    let merged;
    if (rangeDays.length > 0) {
      merged = rangeDays.map(dk=>{
        if (dataMap[dk]) return dataMap[dk];
        /* no failure on this day → MTTR=0, MTBF=24, MA%=100 */
        const d = new Date(dk);
        return {dk, date:d, allSMU:0, failSMU:0, events:0,
                uptime:HRS, mttr:0, mtbf:HRS, ma:100, hasData:false};
      });
    } else {
      /* no date range set — fall back to data-only rows */
      merged = dataRows.sort((a,b)=>a.dk.localeCompare(b.dk));
    }

    daily[m] = merged;
  });

  /* ── Step 4: summary
       Uptime base = ALL days in range × 24h  (incl. zero-failure days)
       tAllDays    = rangeDays.length if date range set, else data-day count
  ── */
  const summary = {};
  MACHINES.forEach(m=>{
    const allDayRows  = daily[m];                          /* every day in range */
    const failRows    = allDayRows.filter(r=>r.events>0);  /* days with ≥1 failure */
    const tAllDays    = allDayRows.length;                 /* total days in range  */

    if (!failRows.length) {
      /* no failures at all → full uptime for every day */
      const tUp = tAllDays * HRS;
      summary[m] = {totalFailDT:0, totalUptime:tUp, totalEvents:0,
                    totalDays:tAllDays, mttr:0, mtbf:tAllDays>0?tUp:HRS, ma:100};
      return;
    }

    const tDT  = failRows.reduce((s,r)=>s+r.failSMU, 0);   /* total failure DT   */
    const tEv  = failRows.reduce((s,r)=>s+r.events,  0);   /* total failure events */
    /* Uptime = all hours in range − failure downtime hours */
    const tUp  = Math.max(tAllDays*HRS - tDT, 0);
    const mttr = tEv>0 ? tDT/tEv : 0;
    const mtbf = tEv>0 ? tUp/tEv : HRS;
    const ma   = mttr+mtbf>0 ? (mtbf/(mtbf+mttr))*100 : 100;
    summary[m] = {totalFailDT:tDT, totalUptime:tUp, totalEvents:tEv,
                  totalDays:tAllDays, mttr, mtbf, ma};
  });

  return{daily,summary};
}
/* ── Combined MA% for a group ────────────────────────────────── */
function calcGroupMA(data, machines, failTypes) {
  /*
    Correct group-MA for N independent machines (no redundancy, each runs 24h).
       base hours = tAllDays × 24 × N          (e.g. 31 days × 24 × 2 = 1488)
       Uptime     = base hours − Σ Failure DT  (from all N machines)
       MTTR/MTBF  = from the combined totals
  */
  const N = machines.length || 1;

  /* Sum DT & events straight from the raw data — no per-day clamping */
  let tDT = 0, tEv = 0;
  data.filter(r=>machines.includes(r.machine)).forEach(r=>{
    if(failTypes.includes(r.type)){
      tDT += r.smu;
      tEv += 1;
    }
  });

  /* count days in selected range */
  function allDaysInRangeLocal() {
    const days=[];
    if(!dateFrom||!dateTo) return days;
    const cur=new Date(dateFrom); cur.setHours(0,0,0,0);
    const end=new Date(dateTo);   end.setHours(23,59,59,999);
    while(cur<=end){ days.push(dateKey(cur)); cur.setDate(cur.getDate()+1); }
    return days;
  }
  const tAllDays  = (allDaysInRangeLocal().length) || 1;
  const baseHours = tAllDays * HRS * N;           /* days × 24 × N machines */
  const tUp       = Math.max(baseHours - tDT, 0);

  if(tEv === 0){
    return{mttr:0, mtbf:baseHours, ma:100,
           totalDays:tAllDays, totalEvents:0, totalFailDT:0, totalUptime:baseHours};
  }
  const mttr = tDT / tEv;
  const mtbf = tUp / tEv;
  const ma   = mttr+mtbf>0 ? (mtbf/(mtbf+mttr))*100 : 100;
  return{mttr, mtbf, ma,
         totalDays:tAllDays, totalEvents:tEv, totalFailDT:tDT, totalUptime:tUp};
}

/* ══════════════════════════════════════════════════════════════
   DETAIL TABLE STATE & RENDER
══════════════════════════════════════════════════════════════ */
let dtMachine = 'all';
let dtTypes   = new Set(['Plan','ME','EE','OPT','Uncontrol']);
let dtSortCol = 'smu';   /* 'smu' | 'date' */
let dtSearch  = '';       /* free-text search on detail column */
let dtSortDir = 'desc';  /* 'desc' | 'asc' */
const DT_TYPES = ['Plan','ME','EE','OPT','Uncontrol'];

function renderDetailTable(fd) {
  /* apply machine + type filters */
  const searchLower = dtSearch.toLowerCase().trim();
  let rows = fd.filter(function(r) {
    if (dtMachine !== 'all' && r.machine !== dtMachine) return false;
    if (!dtTypes.has(r.type)) return false;
    if (searchLower && !(r.detail||'').toLowerCase().includes(searchLower)
        && !r.machine.toLowerCase().includes(searchLower)
        && !r.type.toLowerCase().includes(searchLower)) return false;
    return true;
  });
  rows = rows.slice().sort(function(a,b) {
    let diff = 0;
    if (dtSortCol === 'smu') {
      diff = b.smu - a.smu;
    } else {
      diff = (b.date||new Date(0)) - (a.date||new Date(0));
    }
    return dtSortDir === 'desc' ? diff : -diff;
  });

  const totalSMU = sumS(rows);

  /* machine buttons */
  let machBtns = '';
  const mbList = ['all'].concat(MACHINES);
  for (let i = 0; i < mbList.length; i++) {
    const m      = mbList[i];
    const isAll  = m === 'all';
    const color  = isAll ? '#185fa5' : MC[i-1];
    const active = m === dtMachine;
    const lbl    = isAll ? 'ทั้งหมด' : MSHORT[i-1];
    const cnt    = isAll
      ? fd.filter(function(r){ return dtTypes.has(r.type); }).length
      : fd.filter(function(r){ return r.machine===m && dtTypes.has(r.type); }).length;
    const dotHTML = isAll ? '' :
      '<span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:'
      + (active ? 'rgba(255,255,255,.7)' : color)
      + ';margin-right:5px;vertical-align:middle"></span>';
    const styleStr = active
      ? 'background:' + color + ';color:#fff;border-color:transparent'
      : 'color:var(--text-secondary)';
    machBtns += '<button class="dt-mach-btn" style="' + styleStr + '" onclick="dtSetMachine(\'' + m + '\')">'
      + dotHTML + lbl
      + ' <span style="opacity:.65;font-size:10px">' + cnt + '</span></button>';
  }

  /* type toggle buttons */
  let typeBtns = '';
  for (let i = 0; i < DT_TYPES.length; i++) {
    const t  = DT_TYPES[i];
    const on = dtTypes.has(t);
    const c  = TC[t] || '#888';
    const styleStr = on
      ? 'background:' + c + ';color:#fff;border-color:transparent'
      : 'border-color:' + c + ';color:' + c;
    typeBtns += '<button class="dt-type-btn" style="' + styleStr + '" onclick="dtToggleType(\'' + t + '\')">' + t + '</button>';
  }

  /* table rows */
  let tableBody = '';
  if (rows.length === 0) {
    tableBody = '<tr><td colspan="5" class="no-data">ไม่มีข้อมูลที่ตรงกับตัวกรอง</td></tr>';
  } else {
    for (let i = 0; i < rows.length; i++) {
      const r     = rows[i];
      const color = MC[MACHINES.indexOf(r.machine)] || '#888';
      const badge = r.mergedCount > 1
        ? ' <span class="merged-badge">รวม ' + r.mergedCount + ' กะ</span>'
        : '';
      tableBody +=
        '<tr>' +
        '<td style="white-space:nowrap;font-size:11px">' + fmtDate(r.date) + '</td>' +
        '<td><span style="display:inline-block;width:7px;height:7px;border-radius:2px;background:' + color + ';margin-right:6px;vertical-align:middle"></span>' +
        '<span style="font-weight:500;font-size:12px">' + r.machine + '</span></td>' +
        '<td><span class="pill" style="background:' + (TC[r.type]||'#888') + '22;color:' + (TC[r.type]||'#888') + '">' + r.type + '</span></td>' +
        '<td class="dt-detail-col">' + (r.detail||'—') + badge + '</td>' +
        '<td class="num-right" style="font-weight:500;color:' + color + ';font-size:12px">' + r.smu.toFixed(1) + ' <span style="font-size:10px;opacity:.6">ชม.</span></td>' +
        '</tr>';
    }
  }

  const panel = document.getElementById('dt-panel');
  if (!panel) return;
  panel.innerHTML =
    '<div class="panel-hdr">' +
      '<span class="panel-title">รายละเอียด Downtime</span>' +
      '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
        '<div class="dt-search-wrap">' +
          '<svg style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
          '<input class="dt-search-input" id="dt-search-input" type="text" placeholder="ค้นหารายละเอียด เครื่อง หรือประเภท..." value="' + dtSearch + '" oninput="dtDoSearch(this.value)">' +
        '</div>' +
        '<span class="dt-count">' + rows.length + ' รายการ · รวม ' + totalSMU.toFixed(1) + ' ชม.</span>' +
      '</div>' +
    '</div>' +
    '<div class="dt-controls">' +
      '<div class="dt-machine-btns">' + machBtns + '</div>' +
      '<div class="dt-type-btns">' + typeBtns + '</div>' +
    '</div>' +
    '<div class="tbl-wrap">' +
      '<table>' +
        '<thead><tr>' +
          '<th class="dt-sort-th" onclick="dtToggleSort(\'date\')" style="cursor:pointer;user-select:none;white-space:nowrap">' +
            'วันที่ ' + (dtSortCol==='date' ? (dtSortDir==='desc'?'&#9660;':'&#9650;') : '<span style="opacity:.35">&#9660;</span>') +
          '</th>' +
          '<th>เครื่องจักร</th>' +
          '<th>ประเภท</th>' +
          '<th>รายละเอียด</th>' +
          '<th class="num-right dt-sort-th" onclick="dtToggleSort(\'smu\')" style="cursor:pointer;user-select:none;white-space:nowrap">' +
            'ชั่วโมง ' + (dtSortCol==='smu' ? (dtSortDir==='desc'?'&#9660;':'&#9650;') : '<span style="opacity:.35">&#9660;</span>') +
          '</th>' +
        '</tr></thead>' +
        '<tbody>' + tableBody + '</tbody>' +
      '</table>' +
    '</div>';

  /* Preserve search input focus & caret position across re-render.
     Without this, each keystroke destroys the input and focus is lost,
     forcing the user to click back into the field for every character. */
  const si = document.getElementById('dt-search-input');
  if (si && dtSearch) {
    si.focus();
    const pos = dtSearch.length;
    try { si.setSelectionRange(pos, pos); } catch(e){}
  }
}

function dtSetMachine(m) {
  dtMachine = m;
  const mo = document.getElementById('sel-mo') ? document.getElementById('sel-mo').value : 'all';
  const ty = document.getElementById('sel-ty') ? document.getElementById('sel-ty').value : 'all';
  renderDetailTable(filterD(allMerged, mo, ty));
}

function dtToggleType(t) {
  if (dtTypes.has(t)) {
    if (dtTypes.size > 1) dtTypes.delete(t);
  } else {
    dtTypes.add(t);
  }
  const mo = document.getElementById('sel-mo') ? document.getElementById('sel-mo').value : 'all';
  const ty = document.getElementById('sel-ty') ? document.getElementById('sel-ty').value : 'all';
  renderDetailTable(filterD(allMerged, mo, ty));
}

function dtToggleSort(col) {
  if (dtSortCol === col) {
    dtSortDir = dtSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    dtSortCol = col;
    dtSortDir = 'desc';
  }
  const mo = document.getElementById('sel-mo') ? document.getElementById('sel-mo').value : 'all';
  const ty = document.getElementById('sel-ty') ? document.getElementById('sel-ty').value : 'all';
  renderDetailTable(filterD(allMerged, mo, ty));
}

function dtDoSearch(val) {
  dtSearch = val;
  const mo = document.getElementById('sel-mo') ? document.getElementById('sel-mo').value : 'all';
  const ty = document.getElementById('sel-ty') ? document.getElementById('sel-ty').value : 'all';
  renderDetailTable(filterD(allMerged, mo, ty));
}

          return`<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:2px;background:${MC[i]};margin-right:6px;vertical-align:middle"></span><span style="font-weight:500">${m}</span></td>${TYPE_ORDER.map(t=>`<td style="color:${bt[t]>0?'var(--text-primary)':'var(--text-secondary)'}">${bt[t]>0?bt[t].toFixed(1):'—'}</td>`).join('')}<td style="font-weight:500">${tot.toFixed(1)}</td><td><div style="font-size:11px;color:var(--text-secondary)">${pct.toFixed(1)}%</div><div class="bar-bg"><div class="bar-f" style="width:${pct.toFixed(1)}%;background:${MC[i]}"></div></div></td></tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>

  document.getElementById('leg-type').innerHTML=tl.map((t,i)=>`<span class="leg-item"><span class="leg-sq" style="background:${tc2[i]}"></span>${t} ${((tv[i]/tv.reduce((a,b)=>a+b,1))*100).toFixed(0)}%</span>`).join('');
  charts['donut']=new Chart(document.getElementById('c-donut'),{type:'doughnut',data:{labels:tl,datasets:[{data:tv.map(v=>+v.toFixed(2)),backgroundColor:tc2.map(c=>c+'cc'),borderColor:tc2,borderWidth:1.5,hoverOffset:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.parsed.toFixed(1)} ชม.`}}},cutout:'62%'}});
  document.getElementById('leg-trend').innerHTML=MACHINES.map((m,i)=>`<span class="leg-item"><span class="leg-sq" style="background:${MC[i]}"></span>${MSHORT[i]}</span>`).join('');
  charts['line']=new Chart(document.getElementById('c-line'),{type:'line',data:{labels:months.map(monthLabel),datasets:MACHINES.map((m,i)=>({label:m,data:months.map(k=>+(mmd[m][k]||0).toFixed(2)),borderColor:MC[i],backgroundColor:MC[i]+'18',borderWidth:2,borderDash:DP[i],pointRadius:3,pointBackgroundColor:MC[i],tension:0.35,fill:false}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(1)} ชม.`}}},scales:{x:{grid:{color:gridColor},border:{display:false},ticks:{color:tickColor,font:{size:11},maxRotation:45,autoSkip:months.length>6}},y:{grid:{color:gridColor},border:{display:false},ticks:{color:tickColor,font:{size:11},callback:v=>v.toFixed(0)}}}}});
}

      &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;โดย Uptime = (จำนวนวันทั้งหมดในช่วงที่เลือก × 24) − Σ Failure DT<br>

      Bucket Wheel #1, #2 →&nbsp;ME, EE เท่านั้น<br>

      <br>
      <strong>การรวม Crusher และ Bucket Wheel Excavator (ใน Report กลุ่ม)</strong><br>

/* ══════════════════════════════════════════════════════════════
   PDF REPORT GENERATOR  — one machine per page
══════════════════════════════════════════════════════════════ */
function buildPDFReport(groupKey) {
  const grp   = PRINT_GROUPS[groupKey];
  const rd    = rangeData();
  const fromS = dateFrom ? fmtDate(dateFrom) : 'ทั้งหมด';
  const toS   = dateTo   ? fmtDate(dateTo)   : 'ทั้งหมด';
  const today = fmtDate(new Date());
  const color = grp.color;

  const gma = calcGroupMA(rd, grp.machines, grp.failTypes);
  const { daily, summary } = calcMTTRMTBF(rd);

  /* ── helpers ── */
  function maClass(v) { return v>=95?'g':v>=80?'y':'r'; }
  function mClass(v)  { return v<=2?'g':v<=6?'y':'r'; }
  function bClass(v)  { return v>=18?'g':v>=10?'y':'r'; }

  /* ── Signature block (shared, compact) ── */
  const sigBlock = `
    <div class="rpt-sig-spacer"></div>
    <div class="rpt-sig-block">
      <div class="rpt-sig-box">
        <div class="rpt-sig-role">ผู้นำเสนอ / Prepared by</div>
        <div class="rpt-sig-line"></div>
        <div class="rpt-sig-detail">ชื่อ / Name: ........................................&nbsp;&nbsp; ตำแหน่ง: ........................&nbsp;&nbsp; วันที่: ..................</div>
      </div>
      <div class="rpt-sig-box">
        <div class="rpt-sig-role">ผู้รับรอง / Approved by</div>
        <div class="rpt-sig-line"></div>
        <div class="rpt-sig-detail">ชื่อ / Name: ........................................&nbsp;&nbsp; ตำแหน่ง: ........................&nbsp;&nbsp; วันที่: ..................</div>
      </div>
    </div>`;

  /* ── Build one page per machine ── */
  const pages = grp.machines.map((m, mi) => {
    const s      = summary[m] || { totalFailDT:0, totalUptime:0, totalEvents:0, totalDays:0, mttr:0, mtbf:HRS, ma:100 };
    const mData  = rd.filter(r=>r.machine===m);
    const totalDT = sumS(mData);
    const byType = {}; TYPE_ORDER.forEach(t=>byType[t]=0);
    mData.forEach(r=>{ if(byType[r.type]!==undefined) byType[r.type]+=r.smu; });
    const dailyR = (daily[m]||[]);  /* all days in range incl. zero-failure days */


    /* combined MA for the group (shown on each page of multi-machine groups) */
    const showGroupMA = grp.machines.length > 1;
    const top3m = mData.sort((a,b)=>b.smu-a.smu).slice(0,3);

    return `
    <!-- PAGE: ${m} -->
    <div class="rpt-machine-page" style="--rpt-color:${color}">

      <!-- PAGE HEADER -->
      <div class="rpt-page-header">
        <div>
          <div class="rpt-page-header-title" style="color:${color}">${grp.label}</div>
          <div class="rpt-page-header-sub">${m} &nbsp;·&nbsp; Downtime Analysis Report</div>
        </div>
        <div class="rpt-page-header-meta">
          ช่วงวันที่: <strong>${fromS}</strong> — <strong>${toS}</strong><br>
          Failure Types: <strong>${grp.failTypes.join(', ')}</strong><br>
          พิมพ์: ${today}
        </div>
      </div>

      <!-- MA% KPI BAR -->
      <div class="rpt-kpi-bar">
        <div class="rpt-kpi-box rpt-kpi-ma" style="border-left-color:${color} !important">
          <div class="rpt-kpi-box-label">MA% — ${m}</div>
          <div class="rpt-kpi-box-val ${maClass(s.ma)}" style="font-size:18pt">${s.ma.toFixed(1)}<span style="font-size:9pt;font-weight:400">%</span></div>
        </div>
        ${showGroupMA ? `<div class="rpt-kpi-box rpt-kpi-ma" style="border-left-color:#888 !important">
          <div class="rpt-kpi-box-label">MA% รวม ${grp.label}</div>
          <div class="rpt-kpi-box-val ${maClass(gma.ma)}" style="font-size:18pt">${gma.ma.toFixed(1)}<span style="font-size:9pt;font-weight:400">%</span></div>
        </div>` : ''}
        <div class="rpt-kpi-box">
          <div class="rpt-kpi-box-label">MTTR</div>
          <div class="rpt-kpi-box-val ${mClass(s.mttr)}">${s.mttr.toFixed(2)}</div>
          <div class="rpt-kpi-box-unit">ชม./ครั้ง</div>
        </div>
        <div class="rpt-kpi-box">
          <div class="rpt-kpi-box-label">MTBF</div>
          <div class="rpt-kpi-box-val ${bClass(s.mtbf)}">${s.mtbf.toFixed(2)}</div>
          <div class="rpt-kpi-box-unit">ชม./ครั้ง</div>
        </div>
        <div class="rpt-kpi-box">
          <div class="rpt-kpi-box-label">จำนวนครั้ง Failure</div>
          <div class="rpt-kpi-box-val">${s.totalEvents}</div>
          <div class="rpt-kpi-box-unit">ครั้ง</div>
        </div>
        <div class="rpt-kpi-box">
          <div class="rpt-kpi-box-label">รวม Failure DT</div>
          <div class="rpt-kpi-box-val">${s.totalFailDT.toFixed(1)}</div>
          <div class="rpt-kpi-box-unit">ชั่วโมง</div>
        </div>
        <div class="rpt-kpi-box">
          <div class="rpt-kpi-box-label">รวม Downtime ทั้งหมด</div>
          <div class="rpt-kpi-box-val">${totalDT.toFixed(1)}</div>
          <div class="rpt-kpi-box-unit">ชั่วโมง</div>
        </div>
      </div>

      <!-- DAILY MTTR/MTBF/MA TABLE -->
      <div class="rpt-sec-title accent">MTTR · MTBF · MA% รายวัน</div>
      <div class="rpt-table-wrap">
        ${dailyR.length === 0
          ? `<p style="font-size:8pt;color:#999;padding:4pt 0">ไม่มีข้อมูล Failure ในช่วงที่เลือก</p>`
          : `<table class="rpt-table">
            <thead><tr>
              <th>วันที่</th>
              <th class="num">ครั้ง Failure</th>
              <th class="num">Failure DT (ชม.)</th>

      <div class="rpt-sec-title accent">3 อันดับ Downtime สูงสุด</div>
      <div class="rpt-table-wrap">
        ${top3m.length === 0
          ? `<p style="font-size:8pt;color:#999;padding:4pt 0">ไม่มีข้อมูล</p>`
          : `<table class="rpt-table">
            <thead><tr>
              <th style="width:16pt">#</th>
              <th>รายละเอียด</th>
              <th style="width:52pt">วันที่</th>
              <th style="width:28pt">ประเภท</th>
              <th class="num" style="width:34pt">ชั่วโมง</th>
            </tr></thead>
            <tbody>
              ${top3m.map((r,i)=>`<tr>
                <td class="bold" style="color:${color}">${i+1}</td>
                <td style="font-size:7pt">${r.detail||'—'}${r.mergedCount>1?` <span style="color:#534ab7;font-size:6.5pt">(รวม ${r.mergedCount} กะ)</span>`:''}</td>
                <td style="white-space:nowrap;font-size:7pt">${fmtDate(r.date)}</td>
                <td style="font-size:7pt">${r.type}</td>
                <td class="num bold">${r.smu.toFixed(1)}</td>
              </tr>`).join('')}

          </table>`}
      </div>

      <!-- SIGNATURE BLOCK -->
      ${sigBlock}

    </div>`;
  });

  return pages.join('\n');
}

/* ── Print trigger ──────────────────────────────────────────── */
function printReport(groupKey) {
  const el = document.getElementById('print-report');
  el.innerHTML = buildPDFReport(groupKey);
  setTimeout(() => { window.print(); }, 200);
}

══════════════════════════════════════════════════════════════ */
function refreshData() {
  /* Clear cache for both sheets then reload */
  try {
    localStorage.removeItem('dt_cache_' + CSV_2026);
    localStorage.removeItem('dt_cache_' + CSV_2025);
  } catch(e) {}
  const ov = document.getElementById('load-overlay');
  if (ov) {
    ov.style.opacity = '1';
    ov.style.transition = '';
    ov.classList.remove('hidden');
  }
  loadSetProgress(0, 'กำลังเชื่อมต่อ Google Sheets...');
  init();
}

function updateCacheStatus() {
  const el = document.getElementById('cache-status');
  if (!el) return;
  const c26 = cacheGet(CSV_2026);
  const c25 = cacheGet(CSV_2025);
  if (c26 && c25) {
    el.textContent = 'ข้อมูล Cache พร้อมใช้งาน (จะรีเฟรชอัตโนมัติในอีก 5 นาที)';
  } else {
    el.textContent = '';
  }
}

function applyDateRange() {
  const f=document.getElementById('date-from').value, t=document.getElementById('date-to').value;
  dateFrom=f?new Date(f):null; dateTo=t?new Date(t):null;
  if(dateFrom) dateFrom.setHours(0,0,0,0);
  if(dateTo)   dateTo.setHours(23,59,59,999);
  if(curTab==='overview') renderOverview(getMo(),getTy());
  else renderMTTR(document.getElementById('sel-mach')?.value||MACHINES[0]);
}
function getMo() { return document.getElementById('sel-mo')?.value||'all'; }
function getTy() { return document.getElementById('sel-ty')?.value||'all'; }
function switchTab(tab) {
  curTab=tab;
  document.getElementById('tab-ov').classList.toggle('active',tab==='overview');
  document.getElementById('tab-mt').classList.toggle('active',tab==='mttr');
  document.getElementById('ov-filters').style.display=tab==='overview'?'flex':'none';
  if(tab==='overview') renderOverview(getMo(),getTy());
  else renderMTTR(MACHINES[0]);
}

/* ── Loading progress helpers ─────────────────────────────── */
function loadSetProgress(pct, msg) {
  const bar  = document.getElementById('load-bar');
  const step = document.getElementById('load-step');
  if (bar)  bar.style.width  = pct + '%';
  if (step && msg) step.textContent = msg;
}
function loadDone() {
  const ov = document.getElementById('load-overlay');
  if (ov) {
    ov.style.opacity = '0';
    ov.style.transition = 'opacity .4s ease';
    setTimeout(() => ov.classList.add('hidden'), 420);
  }
}

async function fetchCSV(url) {
  const resp = await fetch(url, { cache: 'no-store' });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const text = await resp.text();
  /* Fast parse: skip empty + dynamic typing off to avoid regex overhead */
  return Papa.parse(text, {
    header: true,
    skipEmptyLines: true,
    dynamicTyping: false,
    worker: false,
  }).data;
}

/* ── localStorage cache helpers ──────────────────────────────
   Cache key = URL, stores { ts, data }.
   TTL = 5 minutes — fresh enough for operational data,
   fast enough that reload feels instant.
──────────────────────────────────────────────────────────── */
const CACHE_TTL_MS = 5 * 60 * 1000; /* 5 minutes */

function cacheGet(url) {
  try {
    const raw = localStorage.getItem('dt_cache_' + url);
    if (!raw) return null;
    const item = JSON.parse(raw);
    if (Date.now() - item.ts > CACHE_TTL_MS) { localStorage.removeItem('dt_cache_' + url); return null; }
    return item.data;
  } catch(e) { return null; }
}

function cacheSet(url, data) {
  try { localStorage.setItem('dt_cache_' + url, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}

async function fetchWithCache(url, label, pctStart, pctEnd) {
  const cached = cacheGet(url);
  if (cached) {
    loadSetProgress(pctEnd, label + ' (จาก cache) ✓');
    return cached;
  }
  loadSetProgress(pctStart, 'กำลังโหลด ' + label + '...');
  const data = await fetchCSV(url);
  loadSetProgress(pctEnd, label + ' ✓');
  cacheSet(url, data);
  return data;
}

async function init() {
  loadSetProgress(5, 'กำลังเชื่อมต่อ Google Sheets...');
  try {
    /* Fetch both sheets — use cache when available */
    const rows2026 = await fetchWithCache(CSV_2026, 'Downtime 2026', 5, 45);
    const rows2025 = await fetchWithCache(CSV_2025, 'Downtime 2025', 45, 80);

    loadSetProgress(85, 'กำลังประมวลผลข้อมูล...');
    const allRows = [...rows2026, ...rows2025];
    allMerged = mergeConsec(allRows.map(parseR).filter(Boolean));

    loadSetProgress(95, 'กำลังสร้าง Dashboard...');
    buildShell();

    loadSetProgress(100, 'เสร็จสิ้น ✓');
    setTimeout(loadDone, 300);
  } catch(e) {
    loadDone();
    document.getElementById('app').innerHTML=`
      <div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div><div><div class="topbar-title">Machine Downtime Dashboard</div></div></div></div>
      <div class="err"><strong>ไม่สามารถดึงข้อมูลได้:</strong> ${e.message}<br><br>กรุณาตรวจสอบว่า Google Sheet ถูกตั้งค่า <strong>"Anyone with the link can view"</strong></div>`;
  }
}
init();
