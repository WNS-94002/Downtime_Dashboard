<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Downtime Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #ffffff; --bg-secondary: #f5f5f4; --bg-tertiary: #eeece7;
    --text-primary: #1a1a18; --text-secondary: #5f5e5a;
    --border: rgba(0,0,0,0.12); --border-light: rgba(0,0,0,0.07);
    --radius-md: 8px; --radius-lg: 12px; --radius-xl: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text-primary: #f0ede8; --text-secondary: #888780;
      --border: rgba(255,255,255,0.12); --border-light: rgba(255,255,255,0.06);
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text-primary); min-height: 100vh; padding: 1.5rem; }
  .db { max-width: 1200px; margin: 0 auto; }

  /* topbar */
  .topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:12px; background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .topbar-icon { width:38px; height:38px; border-radius:10px; background:#185fa5; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .topbar-icon svg { width:18px; height:18px; stroke:#fff; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
  .topbar-title { font-size:17px; font-weight:500; color:var(--text-primary); }
  .topbar-sub { font-size:12px; color:var(--text-secondary); margin-top:1px; }

  /* tabs */
  .tab-row { display:flex; gap:4px; background:var(--bg-secondary); border-radius:10px; padding:4px; border:0.5px solid var(--border-light); width:fit-content; }
  .tab-btn { padding:6px 16px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--text-secondary); }
  .tab-btn.active { background:var(--bg-primary); color:var(--text-primary); border:0.5px solid var(--border); }

  /* filter row */
  .filter-bar { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .filter-chip { display:flex; align-items:center; gap:6px; background:var(--bg-secondary); border:0.5px solid var(--border); border-radius:20px; padding:5px 12px; font-size:12px; color:var(--text-secondary); }
  .filter-chip svg { flex-shrink:0; }
  .filter-chip select, .filter-chip input[type="date"] { border:none; background:transparent; font-size:12px; color:var(--text-primary); outline:none; cursor:pointer; padding:0; font-family:inherit; }
  .filter-chip input[type="date"] { width:110px; }
  .filter-sep { font-size:11px; color:var(--text-secondary); padding:0 2px; }

  /* kpi */
  .kpi-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(115px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .kpi { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.9rem 1rem; position:relative; overflow:hidden; border:0.5px solid var(--border-light); }
  .kpi-accent { position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:var(--radius-lg) 0 0 var(--radius-lg); }
  .kpi-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  .kpi-val { font-size:20px; font-weight:500; color:var(--text-primary); line-height:1; }
  .kpi-unit { font-size:10px; color:var(--text-secondary); margin-top:3px; }
  .kpi-bar-wrap { height:3px; background:var(--border); border-radius:3px; margin-top:8px; }
  .kpi-bar { height:3px; border-radius:3px; }

  /* layout */
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem; margin-bottom:1rem; }
  @media(max-width:700px){ .grid2,.grid3 { grid-template-columns:1fr; } }
  @media(min-width:701px) and (max-width:900px){ .grid3 { grid-template-columns:1fr 1fr; } }

  /* panels */
  .panel { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; }
  .panel-full { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); padding:1rem 1.25rem; margin-bottom:1rem; }
  .panel-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; flex-wrap:wrap; gap:6px; }
  .panel-title { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.06em; }
  .chart-wrap { position:relative; width:100%; }

  /* legend */
  .leg { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
  .leg-item { display:flex; align-items:center; gap:4px; font-size:11px; color:var(--text-secondary); }
  .leg-sq { width:8px; height:8px; border-radius:2px; flex-shrink:0; }

  /* table */
  .tbl-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:12px; }
  th { font-size:10px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; padding:6px 8px; border-bottom:0.5px solid var(--border); text-align:left; white-space:nowrap; }
  td { padding:6px 8px; color:var(--text-primary); border-bottom:0.5px solid var(--border-light); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--bg-secondary); }
  .num-right { text-align:right; font-variant-numeric:tabular-nums; }
  .pill { display:inline-block; padding:2px 8px; border-radius:20px; font-size:10px; font-weight:500; }
  .bar-bg { background:var(--border); border-radius:4px; height:5px; margin-top:4px; }
  .bar-f { height:5px; border-radius:4px; }

  /* top5 */
  .section-hdr { font-size:11px; font-weight:500; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.07em; margin:1.5rem 0 .75rem; }
  .top5-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1rem; margin-bottom:1.5rem; }
  .top5-card { background:var(--bg-primary); border:0.5px solid var(--border); border-radius:var(--radius-xl); overflow:hidden; }
  .top5-card-hdr { display:flex; align-items:center; gap:10px; padding:.75rem 1rem; border-bottom:0.5px solid var(--border); }
  .top5-dot { width:10px; height:10px; border-radius:3px; flex-shrink:0; }
  .top5-machine { font-size:13px; font-weight:500; color:var(--text-primary); }
  .top5-total { margin-left:auto; font-size:11px; color:var(--text-secondary); }
  .top5-item { display:flex; align-items:flex-start; gap:8px; padding:.65rem 1rem; border-bottom:0.5px solid var(--border-light); }
  .top5-item:last-child { border-bottom:none; }
  .top5-rank { width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:500; flex-shrink:0; margin-top:1px; }
  .top5-info { flex:1; min-width:0; }
  .top5-detail { font-size:11px; color:var(--text-primary); line-height:1.4; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .top5-meta { display:flex; align-items:center; gap:6px; margin-top:3px; flex-wrap:wrap; }
  .top5-date { font-size:10px; color:var(--text-secondary); }
  .top5-type { display:inline-block; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:500; }
  .top5-smu { font-size:12px; font-weight:500; flex-shrink:0; text-align:right; margin-top:1px; }
  .top5-smu-unit { font-size:9px; font-weight:400; }
  .merged-badge { display:inline-flex; align-items:center; gap:3px; padding:1px 6px; border-radius:10px; font-size:9px; font-weight:500; background:#534ab722; color:#534ab7; }
  .no-data { padding:1.5rem 1rem; text-align:center; font-size:12px; color:var(--text-secondary); }

  /* mttr info */
  .info-box { font-size:11px; color:var(--text-secondary); background:var(--bg-secondary); border-radius:8px; padding:8px 12px; margin-bottom:1rem; line-height:1.8; }
  .info-box strong { color:var(--text-primary); }

  /* availability ring */
  .av-ring-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:10px; margin-bottom:1.25rem; }
  .av-ring-card { background:var(--bg-secondary); border-radius:var(--radius-lg); padding:.75rem; text-align:center; border:0.5px solid var(--border-light); }
  .av-ring-label { font-size:10px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; }
  .av-ring-val { font-size:22px; font-weight:500; }
  .av-ring-sub { font-size:10px; color:var(--text-secondary); margin-top:2px; }

  /* states */
  .load-msg { text-align:center; padding:4rem; color:var(--text-secondary); font-size:14px; }
  .err { background:#fcebeb; color:#a32d2d; border-radius:var(--radius-lg); padding:1rem 1.25rem; font-size:13px; margin:1rem 0; border:0.5px solid #f09595; }
  @media(prefers-color-scheme:dark){ .err { background:#2e1515; color:#f09595; border-color:#791f1f; } }
</style>
</head>
<body>
<div class="db" id="app"><div class="load-msg">กำลังโหลดข้อมูล...</div></div>

<script>
/* ─── CONFIG ─────────────────────────────────────────────────── */
const SHEET_ID = '1ygTva5iEXjhi-LKMIJAF5909xux1wmSVKCWuZbFDrZA';
const GID      = '103270503';
const CSV_URL  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;
const HOURS_PER_DAY = 24;

/* ─── FAILURE TYPE RULES ─────────────────────────────────────── */
/*
  System         → OPT, ME, EE  count as failures
  All others     → ME, EE only  count as failures
*/
const FAILURE_TYPES = {
  'System'         : ['OPT','ME','EE'],
  'Spreader'       : ['ME','EE'],
  'Crusher #1'     : ['ME','EE'],
  'Crusher #2'     : ['ME','EE'],
  'Crusher #3'     : ['ME','EE'],
  'Bucket Wheel #1': ['ME','EE'],
  'Bucket Wheel #2': ['ME','EE'],
};

/* ─── CONSTANTS ──────────────────────────────────────────────── */
const MACHINES = ['System','Spreader','Crusher #1','Crusher #2','Crusher #3','Bucket Wheel #1','Bucket Wheel #2'];
const MSHORT   = ['Sys','SPD','CR1','CR2','CR3','BW1','BW2'];
const MALIAS   = {
  'system':'System','spreader':'Spreader',
  'crusher #1':'Crusher #1','crusher#1':'Crusher #1',
  'crusher #2':'Crusher #2','crusher#2':'Crusher #2',
  'crusher #3':'Crusher #3','crusher#3':'Crusher #3',
  'bucket wheel #1':'Bucket Wheel #1','bucket wheel#1':'Bucket Wheel #1',
  'bucket wheel #2':'Bucket Wheel #2','bucket wheel#2':'Bucket Wheel #2',
};
const TYPE_ORDER = ['Plan','ME','EE','OPT','Uncontrol'];
const TC = { Plan:'#185fa5', ME:'#a32d2d', EE:'#854f0b', OPT:'#0f6e56', Uncontrol:'#534ab7' };
const MC = ['#185fa5','#a32d2d','#854f0b','#0f6e56','#534ab7','#993c1d','#993556'];
const DP = [[],[8,4],[4,4],[2,4],[8,4,2,4],[6,2],[4,2,2,2]];
const TH_M = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
const RANK_BG  = ['#185fa5','#378add','#85b7eb','#b5d4f4','#e6f1fb'];
const RANK_TXT = ['#fff','#fff','#0c447c','#0c447c','#185fa5'];

/* ─── STATE ──────────────────────────────────────────────────── */
let allMerged = [], charts = {}, currentTab = 'overview';
let dateFrom = null, dateTo = null; /* Date objects or null = no filter */

const isDark    = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)';
const tickColor = '#888780';

/* ─── PARSE ──────────────────────────────────────────────────── */
function normM(l) { return l ? (MALIAS[l.trim().toLowerCase()] || null) : null; }

function parseTStr(s) {
  if (!s) return null;
  const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}

function parseR(row) {
  const machine = normM(row['Location']); if (!machine) return null;
  const smu = parseFloat(row['SMU']); if (isNaN(smu) || smu <= 0) return null;
  const raw = row['Date']; let d = null;
  if (raw) { const p = raw.split('/'); if (p.length === 3) d = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])); }
  const sm = parseTStr(row['Start']), fm = parseTStr(row['Finish']);
  let as = null, af = null;
  if (d && sm !== null && fm !== null) {
    const b = d.getTime() / 60000;
    as = b + sm; af = b + fm + (fm <= sm ? 1440 : 0);
  }
  return { date:d, machine, smu, type:(row['Type']||'').trim()||'Other', detail:(row['Detail']||'').trim(), absStart:as, absFinish:af, mergedCount:1 };
}

/* ─── MERGE CONSECUTIVE ──────────────────────────────────────── */
function normD(d) { return (d||'').toLowerCase().replace(/\s+/g,' ').trim(); }

function mergeConsec(records) {
  const sorted = [...records].sort((a,b) => {
    if (a.machine !== b.machine) return a.machine.localeCompare(b.machine);
    return (a.absStart||0) - (b.absStart||0);
  });
  const merged = [];
  for (const rec of sorted) {
    if (!rec.absStart || !rec.absFinish) { merged.push({...rec}); continue; }
    let found = false;
    for (let i = merged.length-1; i >= 0; i--) {
      const m = merged[i]; if (m.machine !== rec.machine) break; if (!m.absFinish) continue;
      if (m.absFinish === rec.absStart && m.type === rec.type && normD(m.detail) === normD(rec.detail)) {
        m.absFinish = rec.absFinish; m.smu = parseFloat((m.smu + rec.smu).toFixed(4)); m.mergedCount++; found = true; break;
      }
    }
    if (!found) merged.push({...rec});
  }
  return merged;
}

/* ─── DATE HELPERS ───────────────────────────────────────────── */
function dateKey(d)    { return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : '?'; }
function monthKey(d)   { return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}` : '?'; }
function monthLabel(k) { if (k==='?') return '?'; const [y,m]=k.split('-'); return `${TH_M[parseInt(m)-1]} ${y}`; }
function fmtDate(d)    { return d ? `${d.getDate()} ${TH_M[d.getMonth()]} ${d.getFullYear()}` : ''; }
function shortDate(d)  { return d ? `${d.getDate()}/${d.getMonth()+1}` : ''; }
function dateToISO(d)  { return d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : ''; }

/* ─── FILTER (date range + month/type) ───────────────────────── */
function inDateRange(r) {
  if (!r.date) return false;
  if (dateFrom && r.date < dateFrom) return false;
  if (dateTo   && r.date > dateTo)   return false;
  return true;
}
function filterD(data, mo, ty) {
  return data.filter(r => {
    if (!inDateRange(r)) return false;
    if (mo !== 'all' && monthKey(r.date) !== mo) return false;
    if (ty !== 'all' && r.type !== ty) return false;
    return true;
  });
}
function rangeData() { return allMerged.filter(inDateRange); }
function sumS(arr) { return arr.reduce((s,r) => s+r.smu, 0); }
function dChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

/* ─── MTTR / MTBF (with per-machine failure type rules) ─────── */
/*
  MA% = MTBF / (MTBF + MTTR) × 100
  — computed per-day then averaged for summary
*/
function isFailure(machine, type) {
  return (FAILURE_TYPES[machine] || ['ME','EE']).includes(type);
}

function calcMTTRMTBF(data) {
  /* group by machine → date, split into failure-DT vs all-DT */
  const bmd = {}; MACHINES.forEach(m => bmd[m] = {});
  data.forEach(r => {
    const dk = dateKey(r.date); if (!bmd[r.machine]) return;
    if (!bmd[r.machine][dk]) bmd[r.machine][dk] = { allSMU:0, failSMU:0, failEvents:0, date:r.date };
    bmd[r.machine][dk].allSMU += r.smu;
    if (isFailure(r.machine, r.type)) {
      bmd[r.machine][dk].failSMU    += r.smu;
      bmd[r.machine][dk].failEvents += 1;
    }
  });

  const daily = {};
  MACHINES.forEach(m => {
    daily[m] = Object.entries(bmd[m]).map(([dk, v]) => {
      const downtime = Math.min(v.failSMU, HOURS_PER_DAY);
      const uptime   = Math.max(HOURS_PER_DAY - downtime, 0);
      const mttr = v.failEvents > 0 ? downtime / v.failEvents : 0;
      const mtbf = v.failEvents > 0 ? uptime   / v.failEvents : HOURS_PER_DAY;
      const ma   = mttr + mtbf > 0  ? (mtbf / (mtbf + mttr)) * 100 : 100;
      return { dk, date:v.date, allSMU:v.allSMU, failSMU:downtime, events:v.failEvents, uptime, mttr, mtbf, ma };
    }).sort((a,b) => a.dk.localeCompare(b.dk));
  });

  const summary = {};
  MACHINES.forEach(m => {
    const rows = daily[m].filter(r => r.events > 0);
    if (!rows.length) { summary[m] = { totalFailDT:0, totalUptime:0, totalEvents:0, totalDays:0, mttr:0, mtbf:HOURS_PER_DAY, ma:100 }; return; }
    const totalFailDT  = rows.reduce((s,r) => s+r.failSMU, 0);
    const totalEvents  = rows.reduce((s,r) => s+r.events, 0);
    const totalDays    = rows.length;
    const totalUptime  = Math.max(totalDays * HOURS_PER_DAY - totalFailDT, 0);
    const mttr = totalEvents > 0 ? totalFailDT / totalEvents : 0;
    const mtbf = totalEvents > 0 ? totalUptime / totalEvents : HOURS_PER_DAY;
    const ma   = mttr + mtbf > 0 ? (mtbf / (mtbf + mttr)) * 100 : 100;
    /* also compute avg daily MA */
    const avgDailyMA = rows.reduce((s,r) => s+r.ma, 0) / rows.length;
    summary[m] = { totalFailDT, totalUptime, totalEvents, totalDays, mttr, mtbf, ma, avgDailyMA };
  });

  return { daily, summary };
}

/* ─── COLOR HELPERS ──────────────────────────────────────────── */
function avC(a)   { return a >= 95 ? '#0f6e56' : a >= 80 ? '#854f0b' : '#a32d2d'; }
function mttrC(v) { return v <= 2  ? '#0f6e56' : v <= 6  ? '#854f0b' : '#a32d2d'; }
function mtbfC(v) { return v >= 18 ? '#0f6e56' : v >= 10 ? '#854f0b' : '#a32d2d'; }

/* ─── TOP-5 CARD ─────────────────────────────────────────────── */
function top5HTML(machine, fd, color) {
  const items  = fd.filter(r => r.machine===machine).sort((a,b) => b.smu-a.smu).slice(0,5);
  const total  = sumS(fd.filter(r => r.machine===machine));
  const mx = items[0]?.smu || 1;
  if (!items.length) return `<div class="top5-card"><div class="top5-card-hdr"><span class="top5-dot" style="background:${color}"></span><span class="top5-machine">${machine}</span></div><div class="no-data">ไม่มีข้อมูล</div></div>`;
  return `<div class="top5-card">
    <div class="top5-card-hdr"><span class="top5-dot" style="background:${color}"></span><span class="top5-machine">${machine}</span><span class="top5-total">${total.toFixed(1)} ชม. รวม</span></div>
    ${items.map((r,i) => `<div class="top5-item">
      <div class="top5-rank" style="background:${RANK_BG[i]};color:${RANK_TXT[i]}">${i+1}</div>
      <div class="top5-info">
        <div class="top5-detail" title="${r.detail}">${r.detail||'—'}</div>
        <div class="top5-meta"><span class="top5-date">${fmtDate(r.date)}</span><span class="top5-type" style="background:${(TC[r.type]||'#888')}22;color:${TC[r.type]||'#888'}">${r.type}</span>${r.mergedCount>1?`<span class="merged-badge">รวม ${r.mergedCount} กะ</span>`:''}</div>
        <div style="height:3px;background:var(--border);border-radius:3px;margin-top:5px"><div style="height:3px;border-radius:3px;width:${(r.smu/mx*100).toFixed(1)}%;background:${color}"></div></div>
      </div>
      <div class="top5-smu" style="color:${color}">${r.smu.toFixed(1)}<span class="top5-smu-unit"> ชม.</span></div>
    </div>`).join('')}
  </div>`;
}

/* ─── RENDER OVERVIEW ────────────────────────────────────────── */
function renderOverview(mo, ty) {
  const fd    = filterD(allMerged, mo, ty);
  const total = sumS(fd);
  const bySMU = {}; MACHINES.forEach(m => bySMU[m]=0); fd.forEach(r => { if (bySMU[r.machine]!==undefined) bySMU[r.machine]+=r.smu; });
  const byType = {}; TYPE_ORDER.forEach(t => byType[t]=0); fd.forEach(r => { if (byType[r.type]!==undefined) byType[r.type]+=r.smu; });
  const rd = rangeData();
  const months = [...new Set(rd.map(r=>monthKey(r.date)).filter(k=>k!=='?'))].sort();
  const maxVal = Math.max(...Object.values(bySMU), 1);
  const mmd = {}; MACHINES.forEach(m => { mmd[m]={}; months.forEach(k => mmd[m][k]=0); });
  rd.filter(r => ty==='all'||r.type===ty).forEach(r => { const k=monthKey(r.date); if(mmd[r.machine]&&k!=='?') mmd[r.machine][k]+=r.smu; });

/* ─── RENDER MTTR/MTBF ───────────────────────────────────────── */
function renderMTTR(selMachine) {
  const rd = rangeData();
  const { daily, summary } = calcMTTRMTBF(rd);
  const dm = daily[selMachine] || [];
  const mColor = MC[MACHINES.indexOf(selMachine)] || '#185fa5';
  const failTypes = FAILURE_TYPES[selMachine] || ['ME','EE'];

  /* MA% ring cards for all machines */
  const maRingsHTML = `
    <div class="av-ring-grid">
      ${MACHINES.map((m,i) => {
        const s = summary[m];
        const ma = s ? s.ma : 100;
        return `<div class="av-ring-card">
          <div class="av-ring-label">${MSHORT[i]}</div>
          <div class="av-ring-val" style="color:${avC(ma)}">${ma.toFixed(1)}<span style="font-size:13px;font-weight:400">%</span></div>

  document.getElementById('tab-content').innerHTML = `

      <strong>สูตรที่ใช้คำนวณ</strong><br>
      MTTR = Failure Downtime ÷ จำนวนครั้ง Failure &nbsp;|&nbsp;
      MTBF = Uptime ÷ จำนวนครั้ง Failure &nbsp;|&nbsp;
      <strong>MA% = MTBF ÷ (MTBF + MTTR) × 100</strong><br>
      Crusher / Bucket Wheel / Spreader นับ Failure: <strong>ME, EE</strong> เท่านั้น &nbsp;|&nbsp;
      System นับ Failure: <strong>OPT, ME, EE</strong>
    </div>

      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>เครื่องจักร</th><th>Failure Types</th>
          <th class="num-right">วันที่มี Failure</th>
          <th class="num-right">จำนวนครั้ง</th>
          <th class="num-right">รวม Failure DT (ชม.)</th>
          <th class="num-right">รวม Uptime (ชม.)</th>
          <th class="num-right">MTTR (ชม./ครั้ง)</th>
          <th class="num-right">MTBF (ชม./ครั้ง)</th>
          <th class="num-right">MA%</th>
        </tr></thead>
        <tbody>
          ${MACHINES.map((m,i) => {
            const s = summary[m];
            const ft = FAILURE_TYPES[m].join(', ');

    <div class="grid2">

/* ─── DATE RANGE CHANGE ──────────────────────────────────────── */
function applyDateRange() {
  const f = document.getElementById('date-from').value;
  const t = document.getElementById('date-to').value;
  dateFrom = f ? new Date(f) : null;
  dateTo   = t ? new Date(t) : null;
  /* clear time part so comparison is day-inclusive */
  if (dateFrom) dateFrom.setHours(0,0,0,0);
  if (dateTo)   dateTo.setHours(23,59,59,999);
  if (currentTab === 'overview') renderOverview(getMo(), getTy());
  else renderMTTR(document.getElementById('sel-mach')?.value || MACHINES[0]);
}

    <div style="margin-bottom:1.25rem;">
      <div class="tab-row">
        <button class="tab-btn active" id="tab-ov">ภาพรวม Downtime</button>
        <button class="tab-btn" id="tab-mt">MTTR / MTBF / MA%</button>
      </div>
    </div>

    <div id="tab-content"></div>
  `;

  /* events */
  document.getElementById('date-from').addEventListener('change', applyDateRange);
  document.getElementById('date-to').addEventListener('change', applyDateRange);
  document.getElementById('sel-mo').addEventListener('change', () => { if(currentTab==='overview') renderOverview(getMo(),getTy()); });
  document.getElementById('sel-ty').addEventListener('change', () => { if(currentTab==='overview') renderOverview(getMo(),getTy()); });
  document.getElementById('tab-ov').addEventListener('click', () => switchTab('overview'));
  document.getElementById('tab-mt').addEventListener('click', () => switchTab('mttr'));

  renderOverview('all', 'all');
}

function getMo() { return document.getElementById('sel-mo')?.value || 'all'; }
function getTy() { return document.getElementById('sel-ty')?.value || 'all'; }

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-ov').classList.toggle('active', tab==='overview');
  document.getElementById('tab-mt').classList.toggle('active', tab==='mttr');
  document.getElementById('ov-filters').style.display = tab==='overview' ? 'flex' : 'none';
  if (tab==='overview') renderOverview(getMo(), getTy());
  else renderMTTR(MACHINES[0]);
}

/* ─── LOAD ───────────────────────────────────────────────────── */
async function init() {
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const result = Papa.parse(text, { header:true, skipEmptyLines:true });
    const raw = result.data.map(parseR).filter(Boolean);
    allMerged = mergeConsec(raw);
    buildShell();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div class="topbar"><div class="topbar-left"><div class="topbar-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div><div><div class="topbar-title">Machine Downtime Dashboard</div></div></div></div>
      <div class="err"><strong>ไม่สามารถดึงข้อมูลได้:</strong> ${e.message}<br><br>กรุณาตรวจสอบว่า Google Sheet ถูกตั้งค่า <strong>"Anyone with the link can view"</strong><br><small style="opacity:.7;margin-top:6px;display:block">URL: ${CSV_URL}</small></div>`;
  }
}
init();
</script>
